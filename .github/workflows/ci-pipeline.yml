name: CI Pipeline

on:
  pull_request:
    types: [ready_for_review, closed]
    branches: ["main"]
    paths-ignore:
      - "**/*.md"

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "24"
  PREVIEW_DOMAIN: pr-${{ github.event.number }}-sai-app-3-0.surge.sh
  PREVIEW_URL: https://pr-${{ github.event.number }}-sai-app-3-0.surge.sh
  AURA_REPORT_DOMAIN: aura-pr-${{ github.event.number }}-sai-app-3-0.surge.sh
  AURA_REPORT_URL: https://aura-pr-${{ github.event.number }}-sai-app-3-0.surge.sh/aura-report.html
  BACKEND_REPORT_DOMAIN: backend-tests-pr-${{ github.event.number }}-sai-app-3-0.surge.sh
  BACKEND_REPORT_URL: https://backend-tests-pr-${{ github.event.number }}-sai-app-3-0.surge.sh/test-report.html
  FRONTEND_REPORT_DOMAIN: frontend-tests-pr-${{ github.event.number }}-sai-app-3-0.surge.sh
  FRONTEND_REPORT_URL: https://frontend-tests-pr-${{ github.event.number }}-sai-app-3-0.surge.sh/test-report.html
  SECURITY_REPORT_DOMAIN: security-pr-${{ github.event.number }}-sai-app-3-0.surge.sh
  SECURITY_FRONTEND_REPORT_URL: https://security-pr-${{ github.event.number }}-sai-app-3-0.surge.sh/zap-frontend-report.html
  SECURITY_API_REPORT_URL: https://security-pr-${{ github.event.number }}-sai-app-3-0.surge.sh/zap-api-report.html

jobs:
  sonarqube-backend:
    name: SonarQube Backend (.NET)
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Validate SonarQube backend access
        id: sonar-backend-access
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_APPLIED_AI_TEAM_BACKEND }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL_APPLIED_AI_TEAM }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ]; then
            echo "can_scan=false" >> "$GITHUB_OUTPUT"
            echo "reason=Missing SONAR_TOKEN_APPLIED_AI_TEAM_BACKEND or SONAR_HOST_URL_APPLIED_AI_TEAM secret." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          AUTH_HTTP=$(curl -sS -u "${SONAR_TOKEN}:" -o /tmp/sonar-auth.json -w "%{http_code}" "${SONAR_HOST_URL}/api/authentication/validate" || echo "000")
          AUTH_VALID=$(python3 -c "import json; print(str(json.load(open('/tmp/sonar-auth.json')).get('valid', False)).lower())" 2>/dev/null || echo "false")

          PROJ_HTTP=$(curl -sS -u "${SONAR_TOKEN}:" -o /tmp/sonar-proj.json -w "%{http_code}" "${SONAR_HOST_URL}/api/projects/search?projects=applied-ai-team-sai3-backend" || echo "000")
          PROJ_COUNT=$(python3 -c "import json; d=json.load(open('/tmp/sonar-proj.json')); print(int(d.get('paging',{}).get('total',0)))" 2>/dev/null || echo "0")

          if [ "$AUTH_HTTP" = "200" ] && [ "$AUTH_VALID" = "true" ]; then
            if [ "$PROJ_HTTP" = "200" ] && [ "$PROJ_COUNT" -ge 1 ]; then
              echo "can_scan=true" >> "$GITHUB_OUTPUT"
              echo "reason=Access validated." >> "$GITHUB_OUTPUT"
            elif [ "$PROJ_HTTP" = "401" ] || [ "$PROJ_HTTP" = "403" ]; then
              echo "can_scan=true" >> "$GITHUB_OUTPUT"
              echo "reason=Token is valid; project visibility check is restricted. Proceeding with scan." >> "$GITHUB_OUTPUT"
            else
              echo "can_scan=false" >> "$GITHUB_OUTPUT"
              echo "reason=Validation failed (auth_http=$AUTH_HTTP, auth_valid=$AUTH_VALID, proj_http=$PROJ_HTTP, proj_count=$PROJ_COUNT)." >> "$GITHUB_OUTPUT"
            fi
          else
            echo "can_scan=false" >> "$GITHUB_OUTPUT"
            echo "reason=Validation failed (auth_http=$AUTH_HTTP, auth_valid=$AUTH_VALID)." >> "$GITHUB_OUTPUT"
          fi

      - name: Cache SonarQube scanner
        if: steps.sonar-backend-access.outputs.can_scan == 'true'
        id: cache-sonar-scanner
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/scanner
          key: ${{ runner.os }}-sonar-scanner-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube scanner
        if: steps.sonar-backend-access.outputs.can_scan == 'true' && steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ runner.temp }}/scanner
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}/scanner

      - name: Build and analyze backend
        if: steps.sonar-backend-access.outputs.can_scan == 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_APPLIED_AI_TEAM_BACKEND }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL_APPLIED_AI_TEAM }}
        shell: bash
        run: |
          cd backend
          ${{ runner.temp }}/scanner/dotnet-sonarscanner begin \
            /k:"applied-ai-team-sai3-backend" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.host.url="$SONAR_HOST_URL" \
            /d:sonar.exclusions="**/*.json,**/*.csproj,**/obj/**,**/bin/**" \
            /d:sonar.coverage.exclusions="**/tests/**,**/*Tests*/**"
          dotnet build TuCreditoOnline.sln --configuration Release
          ${{ runner.temp }}/scanner/dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      - name: SonarQube backend skipped summary
        if: steps.sonar-backend-access.outputs.can_scan != 'true'
        run: |
          echo "## SonarQube Backend (.NET)" >> $GITHUB_STEP_SUMMARY
          echo "Skipped Sonar backend scan: ${{ steps.sonar-backend-access.outputs.reason }}" >> $GITHUB_STEP_SUMMARY

  sonarqube-frontend:
    name: SonarQube Frontend (React/Vite)
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate SonarQube frontend access
        id: sonar-frontend-access
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_APPLIED_AI_TEAM_FRONTEND }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL_APPLIED_AI_TEAM }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ]; then
            echo "can_scan=false" >> "$GITHUB_OUTPUT"
            echo "reason=Missing SONAR_TOKEN_APPLIED_AI_TEAM_FRONTEND or SONAR_HOST_URL_APPLIED_AI_TEAM secret." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          AUTH_HTTP=$(curl -sS -u "${SONAR_TOKEN}:" -o /tmp/sonar-auth.json -w "%{http_code}" "${SONAR_HOST_URL}/api/authentication/validate" || echo "000")
          AUTH_VALID=$(python3 -c "import json; print(str(json.load(open('/tmp/sonar-auth.json')).get('valid', False)).lower())" 2>/dev/null || echo "false")

          PROJ_HTTP=$(curl -sS -u "${SONAR_TOKEN}:" -o /tmp/sonar-proj.json -w "%{http_code}" "${SONAR_HOST_URL}/api/projects/search?projects=applied-ai-team-sai3-frontend" || echo "000")
          PROJ_COUNT=$(python3 -c "import json; d=json.load(open('/tmp/sonar-proj.json')); print(int(d.get('paging',{}).get('total',0)))" 2>/dev/null || echo "0")

          if [ "$AUTH_HTTP" = "200" ] && [ "$AUTH_VALID" = "true" ]; then
            if [ "$PROJ_HTTP" = "200" ] && [ "$PROJ_COUNT" -ge 1 ]; then
              echo "can_scan=true" >> "$GITHUB_OUTPUT"
              echo "reason=Access validated." >> "$GITHUB_OUTPUT"
            elif [ "$PROJ_HTTP" = "401" ] || [ "$PROJ_HTTP" = "403" ]; then
              echo "can_scan=true" >> "$GITHUB_OUTPUT"
              echo "reason=Token is valid; project visibility check is restricted. Proceeding with scan." >> "$GITHUB_OUTPUT"
            else
              echo "can_scan=false" >> "$GITHUB_OUTPUT"
              echo "reason=Validation failed (auth_http=$AUTH_HTTP, auth_valid=$AUTH_VALID, proj_http=$PROJ_HTTP, proj_count=$PROJ_COUNT)." >> "$GITHUB_OUTPUT"
            fi
          else
            echo "can_scan=false" >> "$GITHUB_OUTPUT"
            echo "reason=Validation failed (auth_http=$AUTH_HTTP, auth_valid=$AUTH_VALID)." >> "$GITHUB_OUTPUT"
          fi

      - name: Run SonarQube scan
        if: steps.sonar-frontend-access.outputs.can_scan == 'true'
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.projectKey=applied-ai-team-sai3-frontend
            -Dsonar.projectName=applied-ai-team-sai3-frontend
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.min.js,**/*.css,**/locales/**,**/*.gitkeep,**/test-results/**
            -Dsonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx,**/__tests__/**
            -Dsonar.sourceEncoding=UTF-8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_APPLIED_AI_TEAM_FRONTEND }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL_APPLIED_AI_TEAM }}

      - name: SonarQube frontend skipped summary
        if: steps.sonar-frontend-access.outputs.can_scan != 'true'
        run: |
          echo "## SonarQube Frontend (React/Vite)" >> $GITHUB_STEP_SUMMARY
          echo "Skipped Sonar frontend scan: ${{ steps.sonar-frontend-access.outputs.reason }}" >> $GITHUB_STEP_SUMMARY

  backend-unit-tests:
    name: Backend Unit Tests (.NET)
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      backend_report_url: ${{ steps.publish-backend-report.outputs.backend_report_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore and build backend
        working-directory: ./backend
        run: |
          dotnet restore TuCreditoOnline.sln
          dotnet build TuCreditoOnline.sln --no-restore --configuration Release

      - name: Run backend unit tests
        working-directory: ./backend
        run: |
          dotnet test tests/TuCreditoOnline.Tests/TuCreditoOnline.Tests.csproj \
            --no-build --configuration Release \
            --filter "FullyQualifiedName~.UnitTests." \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./TestResults \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
        continue-on-error: true

      - name: Generate backend test reports
        if: always()
        working-directory: ./backend
        run: |
          npm ci || npm install
          npm run test:report || true
          dotnet tool install -g dotnet-reportgenerator-globaltool || true
          COVERAGE_FILE=$(find ./TestResults -name "coverage.cobertura.xml" -type f | head -n 1)
          if [ -n "$COVERAGE_FILE" ]; then
            reportgenerator -reports:"$COVERAGE_FILE" -targetdir:./TestResults/coverage-report -reporttypes:Html || true
          fi

      - name: Upload backend reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-unit-test-results
          path: |
            backend/TestResults/test-report.html
            backend/TestResults/test-report.md
            backend/TestResults/coverage-report/**
          retention-days: 90
          if-no-files-found: warn

      - name: Publish backend unit report to Surge
        if: always()
        id: publish-backend-report
        working-directory: ./backend
        run: |
          if [ -f "TestResults/test-report.html" ]; then
            npx surge --project TestResults --domain ${{ env.BACKEND_REPORT_DOMAIN }}
            echo "backend_report_url=${{ env.BACKEND_REPORT_URL }}" >> $GITHUB_OUTPUT
          fi
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Backend summary
        if: always()
        working-directory: ./backend
        run: |
          if [ -f "TestResults/test-report.md" ]; then
            cat TestResults/test-report.md >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ steps.publish-backend-report.outputs.backend_report_url }}" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Backend HTML Report: [Open report](${{ steps.publish-backend-report.outputs.backend_report_url }})" >> $GITHUB_STEP_SUMMARY
          fi

  frontend-unit-tests:
    name: Frontend Unit Tests (Jest)
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      frontend_report_url: ${{ steps.publish-frontend-report.outputs.frontend_report_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test -- --coverage --passWithNoTests --ci
        continue-on-error: true

      - name: Generate frontend test reports
        if: always()
        working-directory: ./frontend
        run: npm run test:report || true

      - name: Upload frontend reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-unit-test-results
          path: |
            frontend/test-results/jest/test-report.html
            frontend/test-results/jest/test-report.md
          retention-days: 90

      - name: Publish frontend unit report to Surge
        if: always()
        id: publish-frontend-report
        working-directory: ./frontend
        run: |
          if [ -f "test-results/jest/test-report.html" ]; then
            npx surge --project test-results/jest --domain ${{ env.FRONTEND_REPORT_DOMAIN }}
            echo "frontend_report_url=${{ env.FRONTEND_REPORT_URL }}" >> $GITHUB_OUTPUT
          fi
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Frontend summary
        if: always()
        working-directory: ./frontend
        run: |
          if [ -f "test-results/jest/test-report.md" ]; then
            cat test-results/jest/test-report.md >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ steps.publish-frontend-report.outputs.frontend_report_url }}" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Frontend HTML Report: [Open report](${{ steps.publish-frontend-report.outputs.frontend_report_url }})" >> $GITHUB_STEP_SUMMARY
          fi

  build-and-quality-tests:
    name: Build and Quality Tests
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, frontend-unit-tests]
    outputs:
      security_frontend_report_url: ${{ steps.publish-security-report.outputs.security_frontend_report_url }}
      security_api_report_url: ${{ steps.publish-security-report.outputs.security_api_report_url }}
    timeout-minutes: 35
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore and build backend
        working-directory: ./backend
        run: |
          dotnet restore TuCreditoOnline.sln
          dotnet build TuCreditoOnline.sln --no-restore --configuration Release

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

      - name: Pre-pull ZAP image (background)
        run: |
          docker pull ghcr.io/zaproxy/zaproxy:stable &
          echo $! > /tmp/zap_pull_pid

      - name: Start local services for integration and security tests
        run: |
          docker compose up -d mongodb backend frontend

      - name: Wait and verify services
        run: |
          echo "Waiting for frontend/backend readiness (max 120s)..."
          MAX_WAIT=120
          ELAPSED=0
          FRONTEND_OK=false
          BACKEND_OK=false

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            if [ "$FRONTEND_OK" = false ] && curl -sf http://localhost:3000 -o /dev/null 2>/dev/null; then
              FRONTEND_OK=true
              echo "Frontend ready at ${ELAPSED}s"
            fi

            if [ "$BACKEND_OK" = false ] && curl -sf http://localhost:5000/api/health -o /dev/null 2>/dev/null; then
              BACKEND_OK=true
              echo "Backend ready at ${ELAPSED}s"
            fi

            if [ "$FRONTEND_OK" = true ] && [ "$BACKEND_OK" = true ]; then
              echo "All services ready"
              break
            fi

            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done

          docker compose ps

          if [ -f /tmp/zap_pull_pid ]; then
            wait $(cat /tmp/zap_pull_pid) 2>/dev/null || true
          fi

      - name: Prepare integration and security output directories
        run: |
          mkdir -p test-results/integration
          mkdir -p test-results/security
          mkdir -p test-results/logs
          chmod -R 777 test-results/security || true

      - name: Run integration and security tests (parallel)
        continue-on-error: true
        run: |
          echo "Starting integration and security tests in parallel..."

          (
            cd backend
            dotnet test TuCreditoOnline.sln \
              --no-build \
              --configuration Release \
              --filter "FullyQualifiedName~.IntegrationTests." \
              --logger "trx;LogFileName=integration-results.trx" \
              --results-directory ../test-results/integration \
              --verbosity minimal 2>&1 | tee ../test-results/logs/integration.log
            echo $? > ../test-results/integration/exit-code.txt
          ) &
          INTEGRATION_PID=$!

          (
            docker run --rm --network host \
              -v "$(pwd)/test-results/security:/zap/wrk/:rw" \
              ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
              -t http://localhost:3000 \
              -J zap-frontend-report.json \
              -r zap-frontend-report.html \
              -w zap-frontend-report.md \
              -I 2>&1 | tee ./test-results/logs/zap-frontend.log || true
          ) &
          ZAP_FRONTEND_PID=$!

          (
            docker run --rm --network host \
              -v "$(pwd)/test-results/security:/zap/wrk/:rw" \
              ghcr.io/zaproxy/zaproxy:stable zap-api-scan.py \
              -t http://localhost:5000/swagger/v1/swagger.json \
              -f openapi \
              -J zap-api-report.json \
              -r zap-api-report.html \
              -w zap-api-report.md \
              -I 2>&1 | tee ./test-results/logs/zap-api.log || true
          ) &
          ZAP_API_PID=$!

          TIMEOUT_SECONDS=600
          START_TIME=$(date +%s)

          while true; do
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))

            if [ $ELAPSED -ge $TIMEOUT_SECONDS ]; then
              echo "Timeout reached"
              kill $INTEGRATION_PID $ZAP_FRONTEND_PID $ZAP_API_PID 2>/dev/null || true
              break
            fi

            RUNNING=0
            kill -0 $INTEGRATION_PID 2>/dev/null && RUNNING=$((RUNNING + 1))
            kill -0 $ZAP_FRONTEND_PID 2>/dev/null && RUNNING=$((RUNNING + 1))
            kill -0 $ZAP_API_PID 2>/dev/null && RUNNING=$((RUNNING + 1))

            if [ $RUNNING -eq 0 ]; then
              echo "All test processes finished"
              break
            fi

            sleep 10
          done

          wait $INTEGRATION_PID 2>/dev/null || true
          wait $ZAP_FRONTEND_PID 2>/dev/null || true
          wait $ZAP_API_PID 2>/dev/null || true

      - name: Collect integration/security logs
        if: always()
        run: |
          docker compose logs > test-results/logs/docker-compose.log 2>&1 || true
          docker compose logs backend > test-results/logs/backend.log 2>&1 || true
          docker compose logs frontend > test-results/logs/frontend.log 2>&1 || true

      - name: Evaluate integration exit code
        if: always()
        run: |
          EXIT_CODE="1"
          if [ -f "test-results/integration/exit-code.txt" ]; then
            EXIT_CODE="$(cat test-results/integration/exit-code.txt | tr -d '\r\n')"
          fi
          echo "INTEGRATION_EXIT_CODE=$EXIT_CODE" >> $GITHUB_ENV
          if [ "$EXIT_CODE" = "0" ]; then
            echo "INTEGRATION_OK=true" >> $GITHUB_ENV
          else
            echo "INTEGRATION_OK=false" >> $GITHUB_ENV
          fi
          echo "Integration exit code: $EXIT_CODE"

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: |
            test-results/integration/**
            test-results/logs/integration.log
            test-results/logs/docker-compose.log
            test-results/logs/backend.log
          retention-days: 90
          if-no-files-found: warn

      - name: Upload security test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-test-results
          path: |
            test-results/security/**
            test-results/logs/zap-*.log
          retention-days: 90
          if-no-files-found: warn

      - name: Publish security reports to Surge
        if: always()
        id: publish-security-report
        run: |
          if [ -f "test-results/security/zap-frontend-report.html" ] || [ -f "test-results/security/zap-api-report.html" ]; then
            npx surge --project test-results/security --domain ${{ env.SECURITY_REPORT_DOMAIN }}
            if [ -f "test-results/security/zap-frontend-report.html" ]; then
              echo "security_frontend_report_url=${{ env.SECURITY_FRONTEND_REPORT_URL }}" >> $GITHUB_OUTPUT
            fi
            if [ -f "test-results/security/zap-api-report.html" ]; then
              echo "security_api_report_url=${{ env.SECURITY_API_REPORT_URL }}" >> $GITHUB_OUTPUT
            fi
          fi
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Build and quality summary
        if: always()
        run: |
          ARTIFACTS_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}#artifacts"
          echo "## Build and Quality Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Integration Tests" >> $GITHUB_STEP_SUMMARY
          if [ -f "test-results/integration/integration-results.trx" ]; then
            echo "- TRX generated: \`integration-results.trx\` in artifact [integration-test-results]($ARTIFACTS_URL)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- TRX not generated" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "test-results/logs/integration.log" ]; then
            echo "- Log generated: \`integration.log\` in artifact [integration-test-results]($ARTIFACTS_URL)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Tests (OWASP ZAP)" >> $GITHUB_STEP_SUMMARY
          if [ -f "test-results/security/zap-frontend-report.md" ]; then
            echo "- Frontend report (Markdown): \`zap-frontend-report.md\` in artifact [security-test-results]($ARTIFACTS_URL)" >> $GITHUB_STEP_SUMMARY
            if [ -n "${{ steps.publish-security-report.outputs.security_frontend_report_url }}" ]; then
              echo "- Frontend report (HTML): [Open report](${{ steps.publish-security-report.outputs.security_frontend_report_url }})" >> $GITHUB_STEP_SUMMARY
            else
              echo "- Frontend report (HTML): open \`zap-frontend-report.html\` from artifact [security-test-results]($ARTIFACTS_URL)" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- Frontend report not generated" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "test-results/security/zap-api-report.md" ]; then
            echo "- API report (Markdown): \`zap-api-report.md\` in artifact [security-test-results]($ARTIFACTS_URL)" >> $GITHUB_STEP_SUMMARY
            if [ -n "${{ steps.publish-security-report.outputs.security_api_report_url }}" ]; then
              echo "- API report (HTML): [Open report](${{ steps.publish-security-report.outputs.security_api_report_url }})" >> $GITHUB_STEP_SUMMARY
            else
              echo "- API report (HTML): open \`zap-api-report.html\` from artifact [security-test-results]($ARTIFACTS_URL)" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- API report not generated" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts page: [Open run artifacts]($ARTIFACTS_URL)" >> $GITHUB_STEP_SUMMARY

      - name: Stop local services
        if: always()
        run: docker compose down -v --remove-orphans

      - name: Fail if integration tests failed
        if: always()
        run: |
          if [ "${INTEGRATION_OK}" != "true" ]; then
            echo "Integration tests failed (exit code: ${INTEGRATION_EXIT_CODE})"
            exit 1
          fi

  deploy-preview:
    name: Deploy Preview with Surge
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs: [build-and-quality-tests]
    outputs:
      preview_url: ${{ steps.preview.outputs.preview_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download frontend build artifact
        uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy preview to Surge
        id: preview
        run: |
          npx surge --project frontend/dist --domain ${{ env.PREVIEW_DOMAIN }}
          echo "preview_url=${{ env.PREVIEW_URL }}" >> $GITHUB_OUTPUT
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v8
        with:
          script: |
            const url = `${{ env.PREVIEW_URL }}`;
            const body = `### Preview deployment ready\n\n${url}\n\n_Updated on push to this PR. Torn down when PR is closed._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Preview deployment ready')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  functional-tests-web:
    name: Functional Tests - Web (AURA)
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs: [deploy-preview]
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: automation/frameworks/applied-ai-aura/package-lock.json

      - name: Install AURA dependencies and Playwright
        working-directory: automation/frameworks/applied-ai-aura
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Create AURA .env for CI
        working-directory: automation/frameworks/applied-ai-aura
        env:
          CI_PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          printf "MODEL_PROVIDER=perplexity\n" > .env
          printf "PERPLEXITY_MODEL=sonar\n" >> .env
          printf "PERPLEXITY_API_KEY=%s\n" "${CI_PERPLEXITY_API_KEY}" >> .env
          printf "AURA_TESTER_NAME=SAI APP 3.0\n" >> .env
          printf "AURA_TESTER_EMAIL=sai-latam@stefanini.com\n" >> .env
          printf "AURA_BROWSER=chromium\n" >> .env
          printf "AURA_HEADLESS=true\n" >> .env
          printf "AURA_TIMEOUT=30000\n" >> .env
          printf "AURA_COGNITIVE_ENABLED=true\n" >> .env
          printf "AURA_COGNITIVE_CACHE=true\n" >> .env
          printf "AURA_COGNITIVE_CACHE_TTL=3600\n" >> .env
          printf "AURA_REPORT_TITLE=SAI Test Report\n" >> .env
          printf "AURA_REPORT_VERSION=1.0.0\n" >> .env
          printf "AURA_REPORT_THEME=light\n" >> .env
          printf "AURA_RECORD_VIDEO=true\n" >> .env
          printf "AURA_DOCS_DIR=docs\n" >> .env
          printf "AURA_TARGET_URL=%s\n" "${{ needs.deploy-preview.outputs.preview_url }}" >> .env

      - name: Run AURA functional tests (@preview)
        working-directory: automation/frameworks/applied-ai-aura
        run: npx cucumber-js --tags "@preview"
        continue-on-error: true

      - name: Locate latest AURA report and video
        if: always()
        id: aura-latest
        working-directory: automation/frameworks/applied-ai-aura
        run: |
          LATEST_REPORT=$(find reports -name "aura-report.html" | sort | tail -n 1 || true)
          LATEST_VIDEO=$(find reports -name "*.webm" | sort | tail -n 1 || true)
          echo "latest_report=${LATEST_REPORT}" >> $GITHUB_OUTPUT
          echo "latest_video=${LATEST_VIDEO}" >> $GITHUB_OUTPUT

      - name: Publish latest AURA report to Surge
        if: always() && steps.aura-latest.outputs.latest_report != ''
        id: publish-aura
        working-directory: automation/frameworks/applied-ai-aura
        run: |
          REPORT_DIR=$(dirname "${{ steps.aura-latest.outputs.latest_report }}")
          npx surge --project "$REPORT_DIR" --domain ${{ env.AURA_REPORT_DOMAIN }}
          echo "aura_report_url=${{ env.AURA_REPORT_URL }}" >> $GITHUB_OUTPUT
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Comment AURA report URL on PR
        if: always() && steps.publish-aura.outputs.aura_report_url != ''
        uses: actions/github-script@v8
        with:
          script: |
            const url = `${{ steps.publish-aura.outputs.aura_report_url }}`;
            const body = `### AURA report ready\n\n[Open latest AURA HTML report](${url})\n\n_Updated on push to this PR. Torn down when PR is closed._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('AURA report ready')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload AURA reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: aura-functional-report
          path: |
            automation/frameworks/applied-ai-aura/reports/**
            automation/frameworks/applied-ai-aura/docs/**
          retention-days: 90
          if-no-files-found: warn

      - name: Functional tests summary
        if: always()
        run: |
          echo "## Functional Tests - Web (AURA)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Framework | AURA (Playwright + Cucumber + Cognitive Scanner) |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | PR Preview (Surge) |" >> $GITHUB_STEP_SUMMARY
          echo "| Preview URL | \`${{ needs.deploy-preview.outputs.preview_url }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`@preview\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Latest AURA Report" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.aura-latest.outputs.latest_report }}" ]; then
            echo "- HTML: \`${{ steps.aura-latest.outputs.latest_report }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- HTML: not generated" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ steps.aura-latest.outputs.latest_video }}" ]; then
            echo "- Video: \`${{ steps.aura-latest.outputs.latest_video }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Video: not generated" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ steps.publish-aura.outputs.aura_report_url }}" ]; then
            echo "- Public URL: [Open report](${{ steps.publish-aura.outputs.aura_report_url }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Public URL: not published" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download artifact \`aura-functional-report\` to open the latest HTML report and video." >> $GITHUB_STEP_SUMMARY

  pipeline-summary:
    name: Pipeline Summary
    if: always() && github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs: [sonarqube-backend, sonarqube-frontend, backend-unit-tests, frontend-unit-tests, build-and-quality-tests, deploy-preview, functional-tests-web]
    steps:
      - name: Generate final summary
        run: |
          echo "# SAI APP 3.0 - CI Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Phase | Description | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| SonarQube | Backend and Frontend scans | ${{ needs.sonarqube-backend.result }}/${{ needs.sonarqube-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | Backend and Frontend unit tests | ${{ needs.backend-unit-tests.result }}/${{ needs.frontend-unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | Build backend and frontend | ${{ needs.build-and-quality-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Preview Deploy | Deploy PR preview with Surge | ${{ needs.deploy-preview.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Functional Tests | AURA functional tests and video report | ${{ needs.functional-tests-web.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- backend-unit-test-results" >> $GITHUB_STEP_SUMMARY
          echo "- frontend-unit-test-results" >> $GITHUB_STEP_SUMMARY
          echo "- integration-test-results (TRX + logs)" >> $GITHUB_STEP_SUMMARY
          echo "- security-test-results (OWASP ZAP HTML + JSON + MD + logs)" >> $GITHUB_STEP_SUMMARY
          echo "- aura-functional-report (HTML + video)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Quick Links" >> $GITHUB_STEP_SUMMARY
          echo "- Preview App: [Open preview](${{ needs.deploy-preview.outputs.preview_url }})" >> $GITHUB_STEP_SUMMARY
          echo "- AURA HTML Report: [Open report](${{ env.AURA_REPORT_URL }})" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ secrets.SONAR_HOST_URL_APPLIED_AI_TEAM }}" ]; then
            echo "- Sonar Backend: [Open project](${{ secrets.SONAR_HOST_URL_APPLIED_AI_TEAM }}/dashboard?id=applied-ai-team-sai3-backend)" >> $GITHUB_STEP_SUMMARY
            echo "- Sonar Frontend: [Open project](${{ secrets.SONAR_HOST_URL_APPLIED_AI_TEAM }}/dashboard?id=applied-ai-team-sai3-frontend)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Sonar Backend: SONAR_HOST_URL_APPLIED_AI_TEAM secret not configured" >> $GITHUB_STEP_SUMMARY
            echo "- Sonar Frontend: SONAR_HOST_URL_APPLIED_AI_TEAM secret not configured" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ needs.backend-unit-tests.outputs.backend_report_url }}" ]; then
            echo "- Backend Unit Report: [Open report](${{ needs.backend-unit-tests.outputs.backend_report_url }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Backend Unit Report: not published" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ needs.frontend-unit-tests.outputs.frontend_report_url }}" ]; then
            echo "- Frontend Unit Report: [Open report](${{ needs.frontend-unit-tests.outputs.frontend_report_url }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Frontend Unit Report: not published" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ needs.build-and-quality-tests.outputs.security_frontend_report_url }}" ]; then
            echo "- Security Frontend HTML Report: [Open report](${{ needs.build-and-quality-tests.outputs.security_frontend_report_url }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Security Frontend HTML Report: not published" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ needs.build-and-quality-tests.outputs.security_api_report_url }}" ]; then
            echo "- Security API HTML Report: [Open report](${{ needs.build-and-quality-tests.outputs.security_api_report_url }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Security API HTML Report: not published" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment unit test report URLs on PR
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const backendUrl = `${{ needs.backend-unit-tests.outputs.backend_report_url }}`;
            const frontendUrl = `${{ needs.frontend-unit-tests.outputs.frontend_report_url }}`;
            const backendLine = backendUrl ? `[Open backend unit report](${backendUrl})` : 'Backend unit report not published';
            const frontendLine = frontendUrl ? `[Open frontend unit report](${frontendUrl})` : 'Frontend unit report not published';
            const body = `### Unit test reports ready\n\n- ${backendLine}\n- ${frontendLine}\n\n_Updated on push to this PR. Torn down when PR is closed._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Unit test reports ready')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  teardown-preview:
    if: always() && github.event.action == 'closed'
    needs: [pipeline-summary]
    runs-on: ubuntu-latest
    steps:
      - name: Tear down preview
        run: npx surge teardown ${{ env.PREVIEW_DOMAIN }}
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Tear down AURA report preview
        run: npx surge teardown ${{ env.AURA_REPORT_DOMAIN }} || true
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Tear down backend unit report preview
        run: npx surge teardown ${{ env.BACKEND_REPORT_DOMAIN }} || true
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Tear down frontend unit report preview
        run: npx surge teardown ${{ env.FRONTEND_REPORT_DOMAIN }} || true
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Tear down security report preview
        run: npx surge teardown ${{ env.SECURITY_REPORT_DOMAIN }} || true
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Update PR comment
        uses: actions/github-script@v8
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Preview deployment ready')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: "### Preview deployment\n\n~~Torn down after CI pipeline completed.~~",
              });
            }
