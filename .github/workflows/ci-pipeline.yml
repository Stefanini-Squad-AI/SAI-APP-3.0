  build-and-quality-tests:
    name: "Integration and Security Tests"
    if: github.event.action != 'closed' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    needs: [init-dashboard]
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    outputs:
      security_report_url: ${{ steps.security-report-urls.outputs.security_report_url }}
    timeout-minutes: 35
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Pre-pull ZAP image (background)
        run: |
          docker pull ghcr.io/zaproxy/zaproxy:stable &
          echo $! > /tmp/zap_pull_pid

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore and build backend
        working-directory: ./backend
        run: |
          dotnet restore TuCreditoOnline.sln
          dotnet build TuCreditoOnline.sln --no-restore --configuration Release

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Start local services for integration and security tests
        run: |
          docker compose up -d mongodb backend frontend || true

      - name: Wait and verify services
        run: |
          echo "Waiting for frontend/backend readiness (max 120s)..."
          MAX_WAIT=120
          ELAPSED=0
          FRONTEND_OK=false
          BACKEND_OK=false

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            if [ "$FRONTEND_OK" = false ] && curl -sf http://localhost:3000 -o /dev/null 2>/dev/null; then
              FRONTEND_OK=true
              echo "Frontend ready at ${ELAPSED}s"
            fi

            if [ "$BACKEND_OK" = false ] && curl -sf http://localhost:5000/api/health -o /dev/null 2>/dev/null; then
              BACKEND_OK=true
              echo "Backend ready at ${ELAPSED}s"
            fi

            if [ "$FRONTEND_OK" = true ] && [ "$BACKEND_OK" = true ]; then
              echo "All services ready"
              break
            fi

            sleep 2
            ELAPSED=$((ELAPSED + 2))
          done

          docker compose ps

          if [ -f /tmp/zap_pull_pid ]; then
            wait $(cat /tmp/zap_pull_pid) 2>/dev/null || true
          fi

      - name: Prepare integration and security output directories
        run: |
          mkdir -p test-results/integration
          mkdir -p test-results/security
          mkdir -p test-results/logs
          chmod -R 777 test-results/security || true

      - name: Run integration and security tests (parallel)
        continue-on-error: true
        run: |
          echo "Starting integration and security tests in parallel..."

          (
            set -o pipefail
            cd backend
            dotnet test TuCreditoOnline.sln \
              --no-build \
              --configuration Release \
              --filter "FullyQualifiedName~.IntegrationTests." \
              --logger "trx;LogFileName=integration-results.trx" \
              --results-directory ./TestResults/integration \
              --verbosity minimal \
              --collect:"XPlat Code Coverage" \
              -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura \
              2>&1 | tee ../test-results/logs/integration.log
            echo $? > ./TestResults/integration/exit-code.txt
          ) &
          INTEGRATION_PID=$!

          (
            docker run --rm --network host \
              -v "$(pwd)/test-results/security:/zap/wrk/:rw" \
              ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
              -t http://localhost:3000 \
              -m 1 \
              -z "-config scanner.maxScanDurationInMins=1" \
              -J zap-frontend-report.json \
              -r zap-frontend-report.html \
              -w zap-frontend-report.md \
              -I 2>&1 | tee ./test-results/logs/zap-frontend.log || true
          ) &
          ZAP_FRONTEND_PID=$!

          (
            docker run --rm --network host \
              -v "$(pwd)/test-results/security:/zap/wrk/:rw" \
              ghcr.io/zaproxy/zaproxy:stable zap-api-scan.py \
              -t http://localhost:5000/swagger/v1/swagger.json \
              -f openapi \
              -z "-config scanner.maxScanDurationInMins=1" \
              -J zap-api-report.json \
              -r zap-api-report.html \
              -w zap-api-report.md \
              -I 2>&1 | tee ./test-results/logs/zap-api.log || true
          ) &
          ZAP_API_PID=$!

          TIMEOUT_SECONDS=240
          START_TIME=$(date +%s)

          while true; do
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))

            if [ $ELAPSED -ge $TIMEOUT_SECONDS ]; then
              echo "Integration/security parallel phase reached 4-minute cap — stopping wait"
              kill $INTEGRATION_PID $ZAP_FRONTEND_PID $ZAP_API_PID 2>/dev/null || true
              break
            fi

            RUNNING=0
            kill -0 $INTEGRATION_PID 2>/dev/null && RUNNING=$((RUNNING + 1))
            kill -0 $ZAP_FRONTEND_PID 2>/dev/null && RUNNING=$((RUNNING + 1))
            kill -0 $ZAP_API_PID 2>/dev/null && RUNNING=$((RUNNING + 1))

            if [ $RUNNING -eq 0 ]; then
              echo "All test processes finished"
              break
            fi

            sleep 3
          done

          wait $INTEGRATION_PID 2>/dev/null || true
          wait $ZAP_FRONTEND_PID 2>/dev/null || true
          wait $ZAP_API_PID 2>/dev/null || true

      - name: Collect integration/security logs
        if: always()
        run: |
          docker compose logs --tail=50 > test-results/logs/docker-compose.log 2>&1 || true
          docker compose logs --tail=50 backend > test-results/logs/backend.log 2>&1 || true
          docker compose logs --tail=50 frontend > test-results/logs/frontend.log 2>&1 || true

      - name: Generate Tailwind security dashboard v2 (ZAP JSON → AURA-style HTML)
        if: always()
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          PERPLEXITY_MODEL: sonar
          MODEL_PROVIDER: perplexity
        run: |
          node scripts/generate-security-tailwind-report.cjs || echo "Security dashboard v2: skipped or failed (non-blocking)"

      - name: Generate backend integration report (TRX + Cobertura → HTML, resumen IA)
        if: always()
        working-directory: ./backend
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          BACKEND_REPORT_MODE: integration
        run: |
          npm ci
          node generate-test-report.js --integration || echo "Integration report generation skipped or failed"

      - name: Evaluate integration exit code
        if: always()
        run: |
          EXIT_CODE="1"
          if [ -f "backend/TestResults/integration/exit-code.txt" ]; then
            EXIT_CODE="$(cat backend/TestResults/integration/exit-code.txt | tr -d '\r\n')"
          elif [ -f "test-results/integration/exit-code.txt" ]; then
            EXIT_CODE="$(cat test-results/integration/exit-code.txt | tr -d '\r\n')"
          fi
          echo "INTEGRATION_EXIT_CODE=$EXIT_CODE" >> $GITHUB_ENV
          if [ "$EXIT_CODE" = "0" ]; then
            echo "INTEGRATION_OK=true" >> $GITHUB_ENV
          else
            echo "INTEGRATION_OK=false" >> $GITHUB_ENV
          fi
          echo "Integration exit code: $EXIT_CODE"

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-report
          path: |
            backend/TestResults/integration/**
            test-results/logs/integration.log
            test-results/logs/docker-compose.log
            test-results/logs/backend.log
          retention-days: 90
          if-no-files-found: warn

      - name: Upload security test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-test-report
          path: |
            test-results/security/**
            test-results/logs/zap-*.log
          retention-days: 90
          if-no-files-found: warn

      - name: Record security report Surge URL
        if: always()
        id: security-report-urls
        run: |
          if [ -f "test-results/security/tailwind-dashboard/security-dashboard.html" ]; then
            echo "security_report_url=${{ env.SECURITY_REPORT_URL }}" >> $GITHUB_OUTPUT
          fi

      - name: Publish security dashboard to Surge
        if: always()
        id: publish-security-report
        continue-on-error: true
        run: |
          if [ -f "test-results/security/tailwind-dashboard/security-dashboard.html" ]; then
            npx surge --project test-results/security/tailwind-dashboard --domain ${{ env.SECURITY_REPORT_DOMAIN }}
          fi
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Record integration test report Surge URL
        if: always()
        id: integration-report-url
        run: |
          if [ -f "backend/TestResults/integration/test-report.html" ]; then
            echo "integration_report_url=${{ env.INTEGRATION_REPORT_URL }}" >> $GITHUB_OUTPUT
          fi

      - name: Publish integration test report to Surge
        if: always()
        id: publish-integration-report
        continue-on-error: true
        working-directory: ./backend
        run: |
          if [ -f "TestResults/integration/test-report.html" ]; then
            npx surge --project TestResults/integration --domain ${{ env.INTEGRATION_REPORT_DOMAIN }}
          fi
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Update dashboard — Integration & Security
        if: always()
        uses: actions/github-script@v8
        env:
          INTEGRATION_OK: ${{ env.INTEGRATION_OK }}
          SEC_REPORT_URL: ${{ steps.security-report-urls.outputs.security_report_url }}
          INTEGRATION_REPORT_URL: ${{ steps.integration-report-url.outputs.integration_report_url }}
        with:
          script: |
            const updateDashboard = require('./.github/scripts/update-dashboard');
            const integrationOk = process.env.INTEGRATION_OK === 'true';
            const secReportUrl = process.env.SEC_REPORT_URL;
            const integrationReportUrl = process.env.INTEGRATION_REPORT_URL?.trim();

            const integrationIcon = integrationOk ? '\u2705' : '\u274C';
            const integrationStatus = integrationOk ? 'Tests completed successfully' : 'Tests completed with errors';

            const integrationContent = integrationReportUrl
              ? `> ${integrationIcon} **Integration** - ${integrationStatus} - \u{1F4C4} [View detailed report](${integrationReportUrl})`
              : `> ${integrationIcon} **Integration** - ${integrationStatus} - \u{1F4E6} _Report available in artifacts_`;

            const securityContent = secReportUrl
              ? `> \u2705 **Security** - Tests completed - \u{1F6E1}\uFE0F [View Security Dashboard](${secReportUrl})`
              : '> \u2705 **Security** - Tests completed - \u{1F4E6} _Report available in artifacts_';

            await updateDashboard({ github, context, sections: {
              'integration': integrationContent,
              'security': securityContent,
            } });

      - name: Stop local services
        if: always()
        run: docker compose down -v --remove-orphans

      - name: Report integration errors without failing pipeline
        if: always()
        run: |
          if [ "${INTEGRATION_OK}" != "true" ]; then
            echo "::warning::Integration tests completed with issues (exit code: ${INTEGRATION_EXIT_CODE})."
            echo "Pipeline remains green by design for demo flow continuity."
          fi

  deploy-preview:
    name: "Deploy Preview"
    if: github.event.action != 'closed' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    needs: [init-dashboard]
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    outputs:
      preview_url: ${{ steps.preview-url.outputs.preview_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Record PR preview URL for downstream jobs
        id: preview-url
        run: echo "preview_url=${{ env.PREVIEW_URL }}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend for preview
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_ENABLE_MOCK_BACKEND: "true"
        run: npm run build

      - name: Enable Surge SPA fallback
        run: cp frontend/dist/index.html frontend/dist/200.html

      - name: Include documentation in preview build
        run: |
          mkdir -p frontend/dist/docs
          cp -R docs/* frontend/dist/docs/

      - name: Deploy preview to Surge
        id: preview
        continue-on-error: true
        run: npx surge --project frontend/dist --domain ${{ env.PREVIEW_DOMAIN }}
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Wait for preview to be reachable
        run: |
          URL="${{ env.PREVIEW_URL }}"
          MAX_WAIT=60
          ELAPSED=0
          echo "Waiting for $URL to respond..."
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 10 "$URL" || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
              echo "Preview is up (HTTP $STATUS) after ${ELAPSED}s"
              exit 0
            fi
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done
          echo "Preview did not respond within ${MAX_WAIT}s — link will be posted anyway"

      - name: Update dashboard — Preview
        if: always()
        uses: actions/github-script@v8
        env:
          PREVIEW_URL: ${{ steps.preview-url.outputs.preview_url }}
          EXPECTED_URL: ${{ env.PREVIEW_URL }}
          MAIN_APP_URL: ${{ env.MAIN_APP_URL }}
          PREVIEW_DEPLOY_OUTCOME: ${{ steps.preview.outcome }}
        with:
          script: |
            const updateDashboard = require('./.github/scripts/update-dashboard');
            const deployOk = process.env.PREVIEW_DEPLOY_OUTCOME === 'success';
            const url = process.env.PREVIEW_URL?.trim() || process.env.EXPECTED_URL?.trim();
            const mainAppUrl = process.env.MAIN_APP_URL;
            let content;
            if (deployOk && url) {
              content = [
                '> \u{1F7E2} **Site deployed successfully**',
                '>',
                `> \u{1F517} **[Open preview site](${url})**`,
                ...(mainAppUrl ? [`> \u{1F517} [Current site](${mainAppUrl})`] : []),
              ].join('\n');
            } else if (url && !deployOk) {
              content = [
                '> \u274C **Preview deploy did not complete successfully** (see _Deploy Preview_ job).',
                '>',
                `> \u{1F517} [Open preview URL](${url}) _may show a previous deployment or CDN-cached content._`,
                ...(mainAppUrl ? [`> \u{1F517} [Current site](${mainAppUrl})`] : []),
              ].join('\n');
            } else {
              content = '> \u274C _Failed to deploy preview site_';
            }

            await updateDashboard({ github, context, sections: { 'preview': content } });

      - name: Comment preview URL on PR
        uses: actions/github-script@v8
        with:
          script: |
            const url = `${{ env.PREVIEW_URL }}`;
            const body = `### \u{1F310} Preview available\n\n${url}\n\n_This updates on each push to this PR. It is disabled when the PR is closed._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Preview available')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  docs-preview:
    name: "Docs Preview"
    if: github.event.action != 'closed' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    needs: [deploy-preview]
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect docs directory
        id: detect-docs
        shell: bash
        run: |
          if [ -d "docs" ] && [ -n "$(ls -A docs)" ]; then
            echo "has_docs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_docs=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare docs for Surge (SPA fallback)
        if: steps.detect-docs.outputs.has_docs == 'true'
        run: cp docs/index.html docs/200.html

      - name: Publish PR documentation to Surge
        if: steps.detect-docs.outputs.has_docs == 'true'
        id: publish-docs-surge
        continue-on-error: true
        run: npx surge --project docs --domain ${{ env.DOCS_PREVIEW_DOMAIN }}
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Update dashboard — Docs preview
        if: always()
        uses: actions/github-script@v8
        env:
          HAS_DOCS: ${{ steps.detect-docs.outputs.has_docs }}
          PR_PREVIEW_URL: ${{ env.PREVIEW_URL }}
          MAIN_DOCS_URL: ${{ env.MAIN_DOCS_URL }}
          DOCS_INDEX_SURGE_URL: ${{ env.DOCS_PREVIEW_INDEX_URL }}
          DOCS_SURGE_OUTCOME: ${{ steps.publish-docs-surge.outcome }}
        with:
          script: |
            const updateDashboard = require('./.github/scripts/update-dashboard');
            const hasDocs = process.env.HAS_DOCS === 'true';
            const prPreviewUrl = process.env.PR_PREVIEW_URL;
            const mainDocsUrl = process.env.MAIN_DOCS_URL;
            const surgeIndexUrl = process.env.DOCS_INDEX_SURGE_URL?.trim();
            const surgeOk = process.env.DOCS_SURGE_OUTCOME === 'success';
            const embeddedDocsIndex = prPreviewUrl
              ? `${prPreviewUrl.replace(/\/$/, '')}/docs/index.html`
              : null;
            let content;
            if (hasDocs) {
              const primarySurge = surgeOk && surgeIndexUrl ? surgeIndexUrl : null;
              const fallbackEmbed = embeddedDocsIndex;
              content = [
                '> \u{1F4D6} **Documentation preview**',
                '>',
                ...(primarySurge
                  ? [`> \u{1F517} **[PR documentation](${primarySurge})**`]
                  : (fallbackEmbed
                    ? [`> \u{1F517} **[PR documentation](${fallbackEmbed})**`]
                    : ['> \u23F3 _Documentation URLs will appear once the preview is ready_']
                  )),
                ...(!primarySurge && fallbackEmbed && surgeIndexUrl
                  ? [`> \u{1F4E1} _Surge deploy failed or skipped; [try dedicated docs URL](${surgeIndexUrl}) may be stale._`]
                  : []),
                ...(mainDocsUrl ? [`> \u{1F517} [Current documentation](${mainDocsUrl})`] : []),
              ].join('\n');
            } else {
              content = '> \u26AA _No documentation directory found to publish_';
            }
            await updateDashboard({ github, context, sections: { 'docs-preview': content } });

  functional-tests-web:
    name: "Functional Tests"
    if: github.event.action != 'closed' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    needs: [deploy-preview]
    continue-on-error: true
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: automation/frameworks/applied-ai-aura/package-lock.json

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('automation/frameworks/applied-ai-aura/package-lock.json') }}

      - name: Cache Aura cognitive responses
        uses: actions/cache@v5
        with:
          path: automation/frameworks/applied-ai-aura/docs
          key: ${{ runner.os }}-aura-cognitive-${{ github.event.pull_request.base.sha }}
          restore-keys: ${{ runner.os }}-aura-cognitive-

      - name: Install dependencies and browser engine
        working-directory: automation/frameworks/applied-ai-aura
        run: |
          npm ci
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            npx playwright install chromium --with-deps
          fi

      - name: Create test configuration for CI
        working-directory: automation/frameworks/applied-ai-aura
        env:
          CI_PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          printf "MODEL_PROVIDER=perplexity\n" > .env
          printf "PERPLEXITY_MODEL=sonar\n" >> .env
          printf "PERPLEXITY_API_KEY=%s\n" "${CI_PERPLEXITY_API_KEY}" >> .env
          printf "AURA_TESTER_NAME=SAI APP 3.0\n" >> .env
          printf "AURA_TESTER_EMAIL=sai-latam@stefanini.com\n" >> .env
          printf "AURA_BROWSER=chromium\n" >> .env
          printf "AURA_HEADLESS=true\n" >> .env
          printf "AURA_TIMEOUT=30000\n" >> .env
          printf "AURA_COGNITIVE_ENABLED=true\n" >> .env
          printf "AURA_COGNITIVE_CACHE=true\n" >> .env
          printf "AURA_COGNITIVE_CACHE_TTL=3600\n" >> .env
          printf "AURA_REPORT_TITLE=SAI Test Report\n" >> .env
          printf "AURA_REPORT_FILENAME=aura-report.html\n" >> .env
          printf "AURA_REPORT_VERSION=1.0.0\n" >> .env
          printf "AURA_REPORT_THEME=light\n" >> .env
          printf "AURA_RECORD_VIDEO=true\n" >> .env
          printf "AURA_DOCS_DIR=docs\n" >> .env
          TARGET="${{ needs.deploy-preview.outputs.preview_url }}"
          if [ -z "$TARGET" ]; then TARGET="${{ env.PREVIEW_URL }}"; fi
          printf "AURA_TARGET_URL=%s\n" "$TARGET" >> .env

      - name: Run functional tests
        id: run-tests
        working-directory: automation/frameworks/applied-ai-aura
        run: |
          mkdir -p reports
          npx cucumber-js --tags "@preview or @smoke"
        continue-on-error: true

      # cucumber-js alone only writes aura-scenarios.jsonl per scenario; aura-report.html
      # is produced by TailwindReportEngine (normally invoked after Cucumber in auraRunner).
      - name: Generate consolidated AURA HTML report
        if: always()
        working-directory: automation/frameworks/applied-ai-aura
        run: |
          JSONL=$(find reports -name 'aura-scenarios.jsonl' -type f 2>/dev/null | sort | tail -n 1 || true)
          if [ -z "$JSONL" ] || [ ! -f "reports/cucumber-report.json" ]; then
            echo "Skipping Tailwind report: need reports/cucumber-report.json and a aura-scenarios.jsonl under reports/"
            exit 0
          fi
          export AURA_REPORT_OUTPUT="$(dirname "$JSONL")"
          npx ts-node src/core/reporting/TailwindReportEngine.ts

      - name: Locate latest report and video
        if: always()
        id: locate-report
        working-directory: automation/frameworks/applied-ai-aura
        run: |
          LATEST_REPORT=$(find reports -name "aura-report.html" | sort | tail -n 1 || true)
          LATEST_VIDEO=$(find reports -name "*.webm" | sort | tail -n 1 || true)
          echo "latest_report=${LATEST_REPORT}" >> $GITHUB_OUTPUT
          echo "latest_video=${LATEST_VIDEO}" >> $GITHUB_OUTPUT

      # Record the Surge URL before publishing so the PR dashboard still gets a link if `surge` fails
      # (failed steps do not expose outputs written only after the failing command).
      - name: Record functional report Surge URL
        if: always() && steps.locate-report.outputs.latest_report != ''
        id: functional-report-url
        run: echo "functional_report_url=${{ env.FUNCTIONAL_REPORT_URL }}" >> $GITHUB_OUTPUT

      - name: Publish test report to Surge
        if: always() && steps.locate-report.outputs.latest_report != ''
        id: publish-report
        continue-on-error: true
        working-directory: automation/frameworks/applied-ai-aura
        run: |
          REPORT_DIR=$(dirname "${{ steps.locate-report.outputs.latest_report }}")
          npx surge --project "$REPORT_DIR" --domain ${{ env.FUNCTIONAL_REPORT_DOMAIN }}
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Upload functional test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: functional-report
          path: |
            automation/frameworks/applied-ai-aura/reports/**
            automation/frameworks/applied-ai-aura/docs/**
          retention-days: 90
          if-no-files-found: warn

      - name: Update dashboard — Functional tests
        if: always()
        uses: actions/github-script@v8
        env:
          REPORT_URL: ${{ steps.functional-report-url.outputs.functional_report_url }}
          TESTS_OUTCOME: ${{ steps.run-tests.outcome }}
        with:
          script: |
            const updateDashboard = require('./.github/scripts/update-dashboard');
            const url = process.env.REPORT_URL;
            const ok = process.env.TESTS_OUTCOME === 'success';
            const icon = ok ? '\u2705' : '\u274C';
            const status = ok ? 'Tests completed' : 'Tests completed with errors';
            const content = url
              ? `> ${icon} **Functional** - ${status} - \u{1F4C4} [View detailed report](${url})`
              : `> ${icon} **Functional** - ${status} - \u{1F4E6} _Report available in artifacts_`;

            await updateDashboard({ github, context, sections: { 'functional': content } });

  teardown-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Tear down preview
        run: npx surge teardown ${{ env.PREVIEW_DOMAIN }}
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Tear down functional test report
        run: npx surge teardown ${{ env.FUNCTIONAL_REPORT_DOMAIN }} || true
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Tear down docs preview
        run: npx surge teardown ${{ env.DOCS_PREVIEW_DOMAIN }} || true
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Clean up PR docs from GitHub Pages branch
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prPath = '${{ env.DOCS_GH_PREVIEW_PATH }}';
            try {
              const { data: ref } = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'heads/gh-pages',
              });
              const baseTree = ref.object.sha;
              const { data: commit } = await github.rest.git.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: baseTree,
              });
              const { data: tree } = await github.rest.git.createTree({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base_tree: commit.tree.sha,
                tree: [{ path: prPath, mode: '040000', type: 'tree', sha: null }],
              });
              const { data: newCommit } = await github.rest.git.createCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                message: `chore: remove docs preview for PR #${context.issue.number}`,
                tree: tree.sha,
                parents: [baseTree],
              });
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'heads/gh-pages',
                sha: newCommit.sha,
              });
              core.info(`Removed ${prPath} from gh-pages branch.`);
            } catch (e) {
              core.warning(`Could not clean up PR docs from gh-pages: ${e.message}`);
            }

      - name: Tear down backend unit report
        run: npx surge teardown ${{ env.BACKEND_REPORT_DOMAIN }} || true
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Tear down frontend unit report
        run: npx surge teardown ${{ env.FRONTEND_REPORT_DOMAIN }} || true
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Tear down security report
        run: npx surge teardown ${{ env.SECURITY_REPORT_DOMAIN }} || true
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Tear down integration test report
        run: npx surge teardown ${{ env.INTEGRATION_REPORT_DOMAIN }} || true
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Update dashboard — PR closed
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- ci-dashboard -->';
            const prNumber = context.issue.number;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const comment = comments.find(c => c.body && c.body.includes(marker));
            if (comment) {
              const body = [
                marker,
                '',
                '<div align="center">',
                '',
                '# \u{1F680} Results Dashboard - CI Pipeline',
                '',
                `**Pull Request #${prNumber}** - _Closed_`,
                '',
                '</div>',
                '',
                '---',
                '',
                '> \u{1F512} **Preview sites and online reports have been deactivated** because this Pull Request was closed.',
                '>',
                `> \u{1F4E6} Downloadable artifacts remain available in the repository [**Actions**](${runUrl}) tab.`,
                '',
                '---',
                '',
                '<sub>\u{1F916} Automatically generated by the continuous integration pipeline</sub>',
              ].join('\n');

              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id,
                body,
              });
            }

      - name: Update preview PR comment
        uses: actions/github-script@v8
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Preview available')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: "### \u{1F310} Preview\n\n~~Disabled when the Pull Request was closed.~~",
              });
            }
