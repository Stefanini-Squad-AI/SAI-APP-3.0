  build-and-quality-tests:
    name: "Integration and Security Tests"
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, frontend-unit-tests]
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    outputs:
      security_frontend_report_url: ${{ steps.publish-security-report.outputs.security_frontend_report_url }}
      security_api_report_url: ${{ steps.publish-security-report.outputs.security_api_report_url }}
    timeout-minutes: 35
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore and build backend
        working-directory: ./backend
        run: |
          dotnet restore TuCreditoOnline.sln
          dotnet build TuCreditoOnline.sln --no-restore --configuration Release

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Pre-pull ZAP image (background)
        run: |
          docker pull ghcr.io/zaproxy/zaproxy:stable &
          echo $! > /tmp/zap_pull_pid

      - name: Start local services for integration and security tests
        run: |
          docker compose up -d mongodb backend frontend || true

      - name: Wait and verify services
        run: |
          echo "Waiting for frontend/backend readiness (max 120s)..."
          MAX_WAIT=120
          ELAPSED=0
          FRONTEND_OK=false
          BACKEND_OK=false

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            if [ "$FRONTEND_OK" = false ] && curl -sf http://localhost:3000 -o /dev/null 2>/dev/null; then
              FRONTEND_OK=true
              echo "Frontend ready at ${ELAPSED}s"
            fi

            if [ "$BACKEND_OK" = false ] && curl -sf http://localhost:5000/api/health -o /dev/null 2>/dev/null; then
              BACKEND_OK=true
              echo "Backend ready at ${ELAPSED}s"
            fi

            if [ "$FRONTEND_OK" = true ] && [ "$BACKEND_OK" = true ]; then
              echo "All services ready"
              break
            fi

            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done

          docker compose ps

          if [ -f /tmp/zap_pull_pid ]; then
            wait $(cat /tmp/zap_pull_pid) 2>/dev/null || true
          fi

      - name: Prepare integration and security output directories
        run: |
          mkdir -p test-results/integration
          mkdir -p test-results/security
          mkdir -p test-results/logs
          chmod -R 777 test-results/security || true

      - name: Run integration and security tests (parallel)
        continue-on-error: true
        run: |
          echo "Starting integration and security tests in parallel..."

          (
            cd backend
            dotnet test TuCreditoOnline.sln \
              --no-build \
              --configuration Release \
              --filter "FullyQualifiedName~.IntegrationTests." \
              --logger "trx;LogFileName=integration-results.trx" \
              --results-directory ../test-results/integration \
              --verbosity minimal 2>&1 | tee ../test-results/logs/integration.log
            echo $? > ../test-results/integration/exit-code.txt
          ) &
          INTEGRATION_PID=$!

          (
            docker run --rm --network host \
              -v "$(pwd)/test-results/security:/zap/wrk/:rw" \
              ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
              -t http://localhost:3000 \
              -J zap-frontend-report.json \
              -r zap-frontend-report.html \
              -w zap-frontend-report.md \
              -I 2>&1 | tee ./test-results/logs/zap-frontend.log || true
          ) &
          ZAP_FRONTEND_PID=$!

          (
            docker run --rm --network host \
              -v "$(pwd)/test-results/security:/zap/wrk/:rw" \
              ghcr.io/zaproxy/zaproxy:stable zap-api-scan.py \
              -t http://localhost:5000/swagger/v1/swagger.json \
              -f openapi \
              -J zap-api-report.json \
              -r zap-api-report.html \
              -w zap-api-report.md \
              -I 2>&1 | tee ./test-results/logs/zap-api.log || true
          ) &
          ZAP_API_PID=$!

          TIMEOUT_SECONDS=600
          START_TIME=$(date +%s)

          while true; do
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))

            if [ $ELAPSED -ge $TIMEOUT_SECONDS ]; then
              echo "Timeout reached"
              kill $INTEGRATION_PID $ZAP_FRONTEND_PID $ZAP_API_PID 2>/dev/null || true
              break
            fi

            RUNNING=0
            kill -0 $INTEGRATION_PID 2>/dev/null && RUNNING=$((RUNNING + 1))
            kill -0 $ZAP_FRONTEND_PID 2>/dev/null && RUNNING=$((RUNNING + 1))
            kill -0 $ZAP_API_PID 2>/dev/null && RUNNING=$((RUNNING + 1))

            if [ $RUNNING -eq 0 ]; then
              echo "All test processes finished"
              break
            fi

            sleep 10
          done

          wait $INTEGRATION_PID 2>/dev/null || true
          wait $ZAP_FRONTEND_PID 2>/dev/null || true
          wait $ZAP_API_PID 2>/dev/null || true

      - name: Collect integration/security logs
        if: always()
        run: |
          docker compose logs > test-results/logs/docker-compose.log 2>&1 || true
          docker compose logs backend > test-results/logs/backend.log 2>&1 || true
          docker compose logs frontend > test-results/logs/frontend.log 2>&1 || true

      - name: Evaluate integration exit code
        if: always()
        run: |
          EXIT_CODE="1"
          if [ -f "test-results/integration/exit-code.txt" ]; then
            EXIT_CODE="$(cat test-results/integration/exit-code.txt | tr -d '\r\n')"
          fi
          echo "INTEGRATION_EXIT_CODE=$EXIT_CODE" >> $GITHUB_ENV
          if [ "$EXIT_CODE" = "0" ]; then
            echo "INTEGRATION_OK=true" >> $GITHUB_ENV
          else
            echo "INTEGRATION_OK=false" >> $GITHUB_ENV
          fi
          echo "Integration exit code: $EXIT_CODE"

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-report
          path: |
            test-results/integration/**
            test-results/logs/integration.log
            test-results/logs/docker-compose.log
            test-results/logs/backend.log
          retention-days: 90
          if-no-files-found: warn

      - name: Upload security test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-test-report
          path: |
            test-results/security/**
            test-results/logs/zap-*.log
          retention-days: 90
          if-no-files-found: warn

      - name: Publish security reports to Surge
        if: always()
        id: publish-security-report
        run: |
          if [ -f "test-results/security/zap-frontend-report.html" ] || [ -f "test-results/security/zap-api-report.html" ]; then
            npx surge --project test-results/security --domain ${{ env.SECURITY_REPORT_DOMAIN }}
            if [ -f "test-results/security/zap-frontend-report.html" ]; then
              echo "security_frontend_report_url=${{ env.SECURITY_FRONTEND_REPORT_URL }}" >> $GITHUB_OUTPUT
            fi
            if [ -f "test-results/security/zap-api-report.html" ]; then
              echo "security_api_report_url=${{ env.SECURITY_API_REPORT_URL }}" >> $GITHUB_OUTPUT
            fi
          fi
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Actualizar panel de resultados
        if: always()
        uses: actions/github-script@v8
        env:
          INTEGRATION_OK: ${{ env.INTEGRATION_OK }}
          SEC_FRONTEND_URL: ${{ steps.publish-security-report.outputs.security_frontend_report_url }}
          SEC_API_URL: ${{ steps.publish-security-report.outputs.security_api_report_url }}
        with:
          script: |
            async function updateDashboard(github, context, sections) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              const c = comments.find(c => c.body?.includes('<!-- ci-dashboard -->'));
              if (!c) return;
              let body = c.body;
              for (const [name, content] of Object.entries(sections)) {
                const s = `<!-- section:${name} -->`, e = `<!-- /section:${name} -->`;
                const si = body.indexOf(s), ei = body.indexOf(e);
                if (si !== -1 && ei !== -1)
                  body = body.substring(0, si + s.length) + '\n' + content + '\n' + body.substring(ei);
              }
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: c.id, body,
              });
            }

            const integrationOk = process.env.INTEGRATION_OK === 'true';
            const secFrontendUrl = process.env.SEC_FRONTEND_URL;
            const secApiUrl = process.env.SEC_API_URL;

            const integrationIcon = integrationOk ? '\u2705' : '\u274C';
            const integrationStatus = integrationOk ? 'Tests completed successfully' : 'Tests completed with errors';
            const integrationContent = `> ${integrationIcon} ${integrationStatus} - \u{1F4E6} _Results in artifact \`integration-test-report\`_`;

            let securityLines = [];
            if (secFrontendUrl || secApiUrl) {
              securityLines.push('> \u2705 Security tests completed');
              securityLines.push('>');
              if (secFrontendUrl) securityLines.push(`> \u{1F4C4} [Security report - Frontend](${secFrontendUrl})`);
              if (secApiUrl) securityLines.push(`> \u{1F4C4} [Security report - API](${secApiUrl})`);
            } else {
              securityLines.push('> \u2705 Security tests completed - \u{1F4E6} _Results in artifact \`security-test-report\`_');
            }
            const securityContent = securityLines.join('\n');

            await updateDashboard(github, context, {
              'integration': integrationContent,
              'security': securityContent,
            });

      - name: Stop local services
        if: always()
        run: docker compose down -v --remove-orphans

      - name: Report integration errors without failing pipeline
        if: always()
        run: |
          if [ "${INTEGRATION_OK}" != "true" ]; then
            echo "::warning::Integration tests completed with issues (exit code: ${INTEGRATION_EXIT_CODE})."
            echo "Pipeline remains green by design for demo flow continuity."
          fi

  deploy-preview:
    name: "Deploy Preview"
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
