name: CI Pipeline

on:
  pull_request:
    types: [ready_for_review, closed]
    branches: ["main"]
    paths-ignore:
      - "**/*.md"

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "24"
  PREVIEW_DOMAIN: pr-${{ github.event.number }}-sai-app-3-0.surge.sh
  PREVIEW_URL: https://pr-${{ github.event.number }}-sai-app-3-0.surge.sh
  FUNCTIONAL_REPORT_DOMAIN: functional-pr-${{ github.event.number }}-sai-app-3-0.surge.sh
  FUNCTIONAL_REPORT_URL: https://functional-pr-${{ github.event.number }}-sai-app-3-0.surge.sh/aura-report.html
  BACKEND_REPORT_DOMAIN: backend-tests-pr-${{ github.event.number }}-sai-app-3-0.surge.sh
  BACKEND_REPORT_URL: https://backend-tests-pr-${{ github.event.number }}-sai-app-3-0.surge.sh/test-report.html
  FRONTEND_REPORT_DOMAIN: frontend-tests-pr-${{ github.event.number }}-sai-app-3-0.surge.sh
  FRONTEND_REPORT_URL: https://frontend-tests-pr-${{ github.event.number }}-sai-app-3-0.surge.sh/test-report.html
  SECURITY_REPORT_DOMAIN: security-pr-${{ github.event.number }}-sai-app-3-0.surge.sh
  SECURITY_FRONTEND_REPORT_URL: https://security-pr-${{ github.event.number }}-sai-app-3-0.surge.sh/zap-frontend-report.html
  SECURITY_API_REPORT_URL: https://security-pr-${{ github.event.number }}-sai-app-3-0.surge.sh/zap-api-report.html

jobs:
  init-dashboard:
    name: "\U0001F680 Inicializar Panel de Resultados"
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Crear panel de resultados en el Pull Request
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.issue.number;
            const runId = process.env.GITHUB_RUN_ID;
            const runNumber = process.env.GITHUB_RUN_NUMBER;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${runId}`;
            const artifactsUrl = `${runUrl}#artifacts`;

            const body = [
              '<!-- ci-dashboard -->',
              '',
              '<div align="center">',
              '',
              '# \u{1F680} Panel de Resultados \u2014 CI Pipeline',
              '',
              `**Pull Request #${prNumber}** \u00B7 Ejecuci\u00F3n [**#${runNumber}**](${runUrl})`,
              '',
              '_Los resultados se actualizan autom\u00E1ticamente conforme cada fase del pipeline finaliza._',
              '',
              '</div>',
              '',
              '---',
              '',
              '### \u{1F310} Sitio Web \u2014 Previsualizaci\u00F3n del Pull Request',
              '',
              '<!-- section:preview -->',
              '> \u23F3 _Desplegando sitio de previsualizaci\u00F3n..._',
              '<!-- /section:preview -->',
              '',
              '---',
              '',
              '### \u{1F50D} An\u00E1lisis de Calidad de C\u00F3digo',
              '',
              '<!-- section:sonar-backend -->',
              '> \u{1F7E6} **Backend** \u00B7 \u23F3 _Analizando c\u00F3digo fuente..._',
              '<!-- /section:sonar-backend -->',
              '',
              '<!-- section:sonar-frontend -->',
              '> \u{1F7E6} **Frontend** \u00B7 \u23F3 _Analizando c\u00F3digo fuente..._',
              '<!-- /section:sonar-frontend -->',
              '',
              '---',
              '',
              '### \u{1F4CA} Reportes de Pruebas',
              '',
              '<details open>',
              '<summary><b>\u{1F9EA} Pruebas Unitarias</b></summary>',
              '<br>',
              '',
              '<!-- section:unit-backend -->',
              '> \u{1F7E6} **Backend** \u00B7 \u23F3 _Ejecutando pruebas..._',
              '<!-- /section:unit-backend -->',
              '',
              '<!-- section:unit-frontend -->',
              '> \u{1F7E6} **Frontend** \u00B7 \u23F3 _Ejecutando pruebas..._',
              '<!-- /section:unit-frontend -->',
              '',
              '</details>',
              '',
              '<details open>',
              '<summary><b>\u{1F517} Pruebas de Integraci\u00F3n</b></summary>',
              '<br>',
              '',
              '<!-- section:integration -->',
              '> \u23F3 _Pendiente \u2014 se ejecutar\u00E1n una vez finalicen las pruebas unitarias..._',
              '<!-- /section:integration -->',
              '',
              '</details>',
              '',
              '<details open>',
              '<summary><b>\u{1F6E1}\uFE0F Pruebas de Seguridad</b></summary>',
              '<br>',
              '',
              '<!-- section:security -->',
              '> \u23F3 _Pendiente \u2014 se ejecutar\u00E1n una vez finalicen las pruebas unitarias..._',
              '<!-- /section:security -->',
              '',
              '</details>',
              '',
              '<details open>',
              '<summary><b>\u2705 Pruebas Funcionales</b></summary>',
              '<br>',
              '',
              '<!-- section:functional -->',
              '> \u23F3 _Pendiente \u2014 se ejecutar\u00E1n una vez el sitio de previsualizaci\u00F3n est\u00E9 disponible..._',
              '<!-- /section:functional -->',
              '',
              '</details>',
              '',
              '---',
              '',
              '### \u{1F4E6} Artefactos Descargables',
              '',
              '| | Nombre | Descripci\u00F3n |',
              '|:---:|--------|-------------|',
              '| \u{1F4E6} | `backend-unit-test-report` | Resultados de pruebas unitarias \u2014 Backend |',
              '| \u{1F4E6} | `frontend-unit-test-report` | Resultados de pruebas unitarias \u2014 Frontend |',
              '| \u{1F4E6} | `integration-test-report` | Resultados de pruebas de integraci\u00F3n |',
              '| \u{1F4E6} | `security-test-report` | Resultados de pruebas de seguridad |',
              '| \u{1F4E6} | `functional-report` | Resultados de pruebas funcionales |',
              '',
              `> \u{1F4E5} [**Ir a la p\u00E1gina de artefactos**](${artifactsUrl})`,
              '',
              '---',
              '',
              `<sub>\u{1F916} Generado autom\u00E1ticamente por el pipeline de integraci\u00F3n continua \u00B7 <a href="${runUrl}">Ver ejecuci\u00F3n completa</a></sub>`,
            ].join('\n');

            const marker = '<!-- ci-dashboard -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  sonarqube-backend:
    name: "SonarQube \u2014 Backend"
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs: [init-dashboard]
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    outputs:
      quality_gate: ${{ steps.quality-gate.outputs.status }}
      dashboard_url: ${{ steps.quality-gate.outputs.dashboard_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Validate SonarQube backend access
        id: sonar-backend-access
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_APPLIED_AI_TEAM_SAI3_BACKEND }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL_APPLIED_AI_TEAM }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ]; then
            echo "can_scan=false" >> "$GITHUB_OUTPUT"
            echo "reason=Missing SONAR_TOKEN_APPLIED_AI_TEAM_SAI3_BACKEND or SONAR_HOST_URL_APPLIED_AI_TEAM secret." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          AUTH_HTTP=$(curl -sS -u "${SONAR_TOKEN}:" -o /tmp/sonar-auth.json -w "%{http_code}" "${SONAR_HOST_URL}/api/authentication/validate" || echo "000")
          AUTH_VALID=$(python3 -c "import json; print(str(json.load(open('/tmp/sonar-auth.json')).get('valid', False)).lower())" 2>/dev/null || echo "false")

          PROJ_HTTP=$(curl -sS -u "${SONAR_TOKEN}:" -o /tmp/sonar-proj.json -w "%{http_code}" "${SONAR_HOST_URL}/api/projects/search?projects=applied-ai-team-sai3-backend" || echo "000")
          PROJ_COUNT=$(python3 -c "import json; d=json.load(open('/tmp/sonar-proj.json')); print(int(d.get('paging',{}).get('total',0)))" 2>/dev/null || echo "0")

          echo "::notice::SonarQube backend validation — auth_http=$AUTH_HTTP auth_valid=$AUTH_VALID proj_http=$PROJ_HTTP proj_count=$PROJ_COUNT"

          if [ "$AUTH_HTTP" = "200" ] && [ "$AUTH_VALID" = "true" ]; then
            if [ "$PROJ_HTTP" = "200" ] && [ "$PROJ_COUNT" -ge 1 ]; then
              echo "can_scan=true" >> "$GITHUB_OUTPUT"
              echo "reason=Access fully validated." >> "$GITHUB_OUTPUT"
            elif [ "$PROJ_HTTP" = "401" ] || [ "$PROJ_HTTP" = "403" ]; then
              echo "can_scan=true" >> "$GITHUB_OUTPUT"
              echo "reason=Token is valid but lacks Browse permission (HTTP $PROJ_HTTP). Scan will proceed. Grant Browse permission on the project to enable full Quality Gate reporting." >> "$GITHUB_OUTPUT"
              echo "::warning::SonarQube backend token lacks Browse permission (HTTP $PROJ_HTTP on /api/projects/search). Grant Browse permission to enable Quality Gate checks."
            else
              echo "can_scan=false" >> "$GITHUB_OUTPUT"
              echo "reason=Validation failed (auth_http=$AUTH_HTTP, auth_valid=$AUTH_VALID, proj_http=$PROJ_HTTP, proj_count=$PROJ_COUNT)." >> "$GITHUB_OUTPUT"
            fi
          else
            echo "can_scan=false" >> "$GITHUB_OUTPUT"
            echo "reason=Validation failed (auth_http=$AUTH_HTTP, auth_valid=$AUTH_VALID)." >> "$GITHUB_OUTPUT"
          fi

      - name: Cache SonarQube scanner
        if: steps.sonar-backend-access.outputs.can_scan == 'true'
        id: cache-sonar-scanner
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/scanner
          key: ${{ runner.os }}-sonar-scanner-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube scanner
        if: steps.sonar-backend-access.outputs.can_scan == 'true' && steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ runner.temp }}/scanner
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}/scanner

      - name: Build and analyze backend
        id: sonar-scan
        if: steps.sonar-backend-access.outputs.can_scan == 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_APPLIED_AI_TEAM_SAI3_BACKEND }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL_APPLIED_AI_TEAM }}
        shell: bash
        run: |
          cd backend
          ${{ runner.temp }}/scanner/dotnet-sonarscanner begin \
            /k:"applied-ai-team-sai3-backend" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.host.url="$SONAR_HOST_URL" \
            /d:sonar.exclusions="**/*.json,**/*.csproj,**/obj/**,**/bin/**" \
            /d:sonar.coverage.exclusions="**/tests/**,**/*Tests*/**"
          dotnet build TuCreditoOnline.sln --configuration Release
          ${{ runner.temp }}/scanner/dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      - name: Check backend Quality Gate
        id: quality-gate
        if: always() && steps.sonar-backend-access.outputs.can_scan == 'true'
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_APPLIED_AI_TEAM_SAI3_BACKEND }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL_APPLIED_AI_TEAM }}
        run: |
          REPORT_TASK="backend/.sonarqube/out/.sonar/report-task.txt"
          if [ ! -f "$REPORT_TASK" ]; then
            echo "status=UNAVAILABLE" >> "$GITHUB_OUTPUT"
            echo "detail=report-task.txt not found." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CE_TASK_ID=$(grep '^ceTaskId=' "$REPORT_TASK" | cut -d= -f2)
          DASHBOARD_URL=$(grep '^dashboardUrl=' "$REPORT_TASK" | cut -d= -f2-)
          echo "dashboard_url=$DASHBOARD_URL" >> "$GITHUB_OUTPUT"

          MAX_WAIT=300; ELAPSED=0; CE_STATUS="PENDING"
          while [ "$CE_STATUS" = "PENDING" ] || [ "$CE_STATUS" = "IN_PROGRESS" ]; do
            if [ $ELAPSED -ge $MAX_WAIT ]; then
              echo "status=TIMEOUT" >> "$GITHUB_OUTPUT"
              echo "detail=Analysis task did not complete within ${MAX_WAIT}s." >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 5; ELAPSED=$((ELAPSED + 5))
            CE_RESPONSE=$(curl -sS -u "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/ce/task?id=${CE_TASK_ID}" 2>/dev/null || echo '{}')
            CE_STATUS=$(python3 -c "import sys,json; print(json.load(sys.stdin).get('task',{}).get('status','UNKNOWN'))" <<< "$CE_RESPONSE" 2>/dev/null || echo "UNKNOWN")
          done

          if [ "$CE_STATUS" != "SUCCESS" ]; then
            echo "status=CE_FAILED" >> "$GITHUB_OUTPUT"
            echo "detail=Analysis task ended with status: $CE_STATUS." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ANALYSIS_ID=$(python3 -c "import sys,json; print(json.load(sys.stdin).get('task',{}).get('analysisId',''))" <<< "$CE_RESPONSE" 2>/dev/null || echo "")
          QG_HTTP=$(curl -sS -u "${SONAR_TOKEN}:" -o /tmp/qg-backend.json -w "%{http_code}" \
            "${SONAR_HOST_URL}/api/qualitygates/project_status?analysisId=${ANALYSIS_ID}" 2>/dev/null || echo "000")

          if [ "$QG_HTTP" != "200" ]; then
            echo "status=UNAVAILABLE" >> "$GITHUB_OUTPUT"
            echo "detail=Could not retrieve Quality Gate (HTTP $QG_HTTP). Token may lack Browse permission." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          QG_STATUS=$(python3 -c "import json; print(json.load(open('/tmp/qg-backend.json')).get('projectStatus',{}).get('status','UNKNOWN'))" 2>/dev/null || echo "UNKNOWN")
          echo "status=$QG_STATUS" >> "$GITHUB_OUTPUT"

          if [ "$QG_STATUS" = "OK" ]; then
            echo "detail=Quality Gate passed." >> "$GITHUB_OUTPUT"
          elif [ "$QG_STATUS" = "ERROR" ]; then
            echo "detail=Quality Gate FAILED." >> "$GITHUB_OUTPUT"
            echo "::warning::SonarQube Quality Gate FAILED for backend project."
          else
            echo "detail=Quality Gate status: $QG_STATUS." >> "$GITHUB_OUTPUT"
          fi

      - name: Actualizar panel de resultados
        if: always()
        uses: actions/github-script@v8
        env:
          QG_STATUS: ${{ steps.quality-gate.outputs.status }}
          DASHBOARD_URL: ${{ steps.quality-gate.outputs.dashboard_url }}
          CAN_SCAN: ${{ steps.sonar-backend-access.outputs.can_scan }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL_APPLIED_AI_TEAM }}
        with:
          script: |
            async function updateDashboard(github, context, sections) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              const c = comments.find(c => c.body?.includes('<!-- ci-dashboard -->'));
              if (!c) return;
              let body = c.body;
              for (const [name, content] of Object.entries(sections)) {
                const s = `<!-- section:${name} -->`, e = `<!-- /section:${name} -->`;
                const si = body.indexOf(s), ei = body.indexOf(e);
                if (si !== -1 && ei !== -1)
                  body = body.substring(0, si + s.length) + '\n' + content + '\n' + body.substring(ei);
              }
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: c.id, body,
              });
            }

            const qg = process.env.QG_STATUS;
            const url = process.env.DASHBOARD_URL ||
              (process.env.SONAR_HOST_URL ? `${process.env.SONAR_HOST_URL}/dashboard?id=applied-ai-team-sai3-backend` : '');
            const canScan = process.env.CAN_SCAN;

            let content;
            if (canScan !== 'true') {
              content = '> \u26A0\uFE0F **Backend** \u00B7 _An\u00E1lisis no ejecutado \u2014 verificar configuraci\u00F3n de acceso_';
            } else if (qg === 'OK') {
              content = `> \u2705 **Backend** \u00B7 Quality Gate Aprobado \u00B7 \u{1F517} [Ver an\u00E1lisis en detalle](${url})`;
            } else if (qg === 'ERROR') {
              content = `> \u274C **Backend** \u00B7 Quality Gate No Aprobado \u00B7 \u{1F517} [Ver an\u00E1lisis en detalle](${url})`;
            } else {
              content = url
                ? `> \u26A0\uFE0F **Backend** \u00B7 Quality Gate: ${qg || 'Pendiente'} \u00B7 \u{1F517} [Ver resultados](${url})`
                : `> \u26A0\uFE0F **Backend** \u00B7 Quality Gate: ${qg || 'No disponible'}`;
            }

            await updateDashboard(github, context, { 'sonar-backend': content });

  sonarqube-frontend:
    name: "SonarQube \u2014 Frontend"
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs: [init-dashboard]
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    outputs:
      quality_gate: ${{ steps.quality-gate.outputs.status }}
      dashboard_url: ${{ steps.quality-gate.outputs.dashboard_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate SonarQube frontend access
        id: sonar-frontend-access
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_APPLIED_AI_TEAM_SAI3_FRONTEND }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL_APPLIED_AI_TEAM }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ]; then
            echo "can_scan=false" >> "$GITHUB_OUTPUT"
            echo "reason=Missing SONAR_TOKEN_APPLIED_AI_TEAM_SAI3_FRONTEND or SONAR_HOST_URL_APPLIED_AI_TEAM secret." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          AUTH_HTTP=$(curl -sS -u "${SONAR_TOKEN}:" -o /tmp/sonar-auth.json -w "%{http_code}" "${SONAR_HOST_URL}/api/authentication/validate" || echo "000")
          AUTH_VALID=$(python3 -c "import json; print(str(json.load(open('/tmp/sonar-auth.json')).get('valid', False)).lower())" 2>/dev/null || echo "false")

          PROJ_HTTP=$(curl -sS -u "${SONAR_TOKEN}:" -o /tmp/sonar-proj.json -w "%{http_code}" "${SONAR_HOST_URL}/api/projects/search?projects=applied-ai-team-sai3-frontend" || echo "000")
          PROJ_COUNT=$(python3 -c "import json; d=json.load(open('/tmp/sonar-proj.json')); print(int(d.get('paging',{}).get('total',0)))" 2>/dev/null || echo "0")

          echo "::notice::SonarQube frontend validation — auth_http=$AUTH_HTTP auth_valid=$AUTH_VALID proj_http=$PROJ_HTTP proj_count=$PROJ_COUNT"

          if [ "$AUTH_HTTP" = "200" ] && [ "$AUTH_VALID" = "true" ]; then
            if [ "$PROJ_HTTP" = "200" ] && [ "$PROJ_COUNT" -ge 1 ]; then
              echo "can_scan=true" >> "$GITHUB_OUTPUT"
              echo "reason=Access fully validated." >> "$GITHUB_OUTPUT"
            elif [ "$PROJ_HTTP" = "401" ] || [ "$PROJ_HTTP" = "403" ]; then
              echo "can_scan=true" >> "$GITHUB_OUTPUT"
              echo "reason=Token is valid but lacks Browse permission (HTTP $PROJ_HTTP). Scan will proceed. Grant Browse permission on the project to enable full Quality Gate reporting." >> "$GITHUB_OUTPUT"
              echo "::warning::SonarQube frontend token lacks Browse permission (HTTP $PROJ_HTTP on /api/projects/search). Grant Browse permission to enable Quality Gate checks."
            else
              echo "can_scan=false" >> "$GITHUB_OUTPUT"
              echo "reason=Validation failed (auth_http=$AUTH_HTTP, auth_valid=$AUTH_VALID, proj_http=$PROJ_HTTP, proj_count=$PROJ_COUNT)." >> "$GITHUB_OUTPUT"
            fi
          else
            echo "can_scan=false" >> "$GITHUB_OUTPUT"
            echo "reason=Validation failed (auth_http=$AUTH_HTTP, auth_valid=$AUTH_VALID)." >> "$GITHUB_OUTPUT"
          fi

      - name: Run SonarQube scan
        id: sonar-scan
        if: steps.sonar-frontend-access.outputs.can_scan == 'true'
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.projectKey=applied-ai-team-sai3-frontend
            -Dsonar.projectName=applied-ai-team-sai3-frontend
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.min.js,**/*.css,**/locales/**,**/*.gitkeep,**/test-results/**
            -Dsonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx,**/__tests__/**
            -Dsonar.sourceEncoding=UTF-8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_APPLIED_AI_TEAM_SAI3_FRONTEND }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL_APPLIED_AI_TEAM }}

      - name: Check frontend Quality Gate
        id: quality-gate
        if: always() && steps.sonar-frontend-access.outputs.can_scan == 'true'
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_APPLIED_AI_TEAM_SAI3_FRONTEND }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL_APPLIED_AI_TEAM }}
        run: |
          REPORT_TASK="frontend/.scannerwork/report-task.txt"
          if [ ! -f "$REPORT_TASK" ]; then
            echo "status=UNAVAILABLE" >> "$GITHUB_OUTPUT"
            echo "detail=report-task.txt not found." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CE_TASK_ID=$(grep '^ceTaskId=' "$REPORT_TASK" | cut -d= -f2)
          DASHBOARD_URL=$(grep '^dashboardUrl=' "$REPORT_TASK" | cut -d= -f2-)
          echo "dashboard_url=$DASHBOARD_URL" >> "$GITHUB_OUTPUT"

          MAX_WAIT=300; ELAPSED=0; CE_STATUS="PENDING"
          while [ "$CE_STATUS" = "PENDING" ] || [ "$CE_STATUS" = "IN_PROGRESS" ]; do
            if [ $ELAPSED -ge $MAX_WAIT ]; then
              echo "status=TIMEOUT" >> "$GITHUB_OUTPUT"
              echo "detail=Analysis task did not complete within ${MAX_WAIT}s." >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 5; ELAPSED=$((ELAPSED + 5))
            CE_RESPONSE=$(curl -sS -u "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/ce/task?id=${CE_TASK_ID}" 2>/dev/null || echo '{}')
            CE_STATUS=$(python3 -c "import sys,json; print(json.load(sys.stdin).get('task',{}).get('status','UNKNOWN'))" <<< "$CE_RESPONSE" 2>/dev/null || echo "UNKNOWN")
          done

          if [ "$CE_STATUS" != "SUCCESS" ]; then
            echo "status=CE_FAILED" >> "$GITHUB_OUTPUT"
            echo "detail=Analysis task ended with status: $CE_STATUS." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ANALYSIS_ID=$(python3 -c "import sys,json; print(json.load(sys.stdin).get('task',{}).get('analysisId',''))" <<< "$CE_RESPONSE" 2>/dev/null || echo "")
          QG_HTTP=$(curl -sS -u "${SONAR_TOKEN}:" -o /tmp/qg-frontend.json -w "%{http_code}" \
            "${SONAR_HOST_URL}/api/qualitygates/project_status?analysisId=${ANALYSIS_ID}" 2>/dev/null || echo "000")

          if [ "$QG_HTTP" != "200" ]; then
            echo "status=UNAVAILABLE" >> "$GITHUB_OUTPUT"
            echo "detail=Could not retrieve Quality Gate (HTTP $QG_HTTP). Token may lack Browse permission." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          QG_STATUS=$(python3 -c "import json; print(json.load(open('/tmp/qg-frontend.json')).get('projectStatus',{}).get('status','UNKNOWN'))" 2>/dev/null || echo "UNKNOWN")
          echo "status=$QG_STATUS" >> "$GITHUB_OUTPUT"

          if [ "$QG_STATUS" = "OK" ]; then
            echo "detail=Quality Gate passed." >> "$GITHUB_OUTPUT"
          elif [ "$QG_STATUS" = "ERROR" ]; then
            echo "detail=Quality Gate FAILED." >> "$GITHUB_OUTPUT"
            echo "::warning::SonarQube Quality Gate FAILED for frontend project."
          else
            echo "detail=Quality Gate status: $QG_STATUS." >> "$GITHUB_OUTPUT"
          fi

      - name: Actualizar panel de resultados
        if: always()
        uses: actions/github-script@v8
        env:
          QG_STATUS: ${{ steps.quality-gate.outputs.status }}
          DASHBOARD_URL: ${{ steps.quality-gate.outputs.dashboard_url }}
          CAN_SCAN: ${{ steps.sonar-frontend-access.outputs.can_scan }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL_APPLIED_AI_TEAM }}
        with:
          script: |
            async function updateDashboard(github, context, sections) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              const c = comments.find(c => c.body?.includes('<!-- ci-dashboard -->'));
              if (!c) return;
              let body = c.body;
              for (const [name, content] of Object.entries(sections)) {
                const s = `<!-- section:${name} -->`, e = `<!-- /section:${name} -->`;
                const si = body.indexOf(s), ei = body.indexOf(e);
                if (si !== -1 && ei !== -1)
                  body = body.substring(0, si + s.length) + '\n' + content + '\n' + body.substring(ei);
              }
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: c.id, body,
              });
            }

            const qg = process.env.QG_STATUS;
            const url = process.env.DASHBOARD_URL ||
              (process.env.SONAR_HOST_URL ? `${process.env.SONAR_HOST_URL}/dashboard?id=applied-ai-team-sai3-frontend` : '');
            const canScan = process.env.CAN_SCAN;

            let content;
            if (canScan !== 'true') {
              content = '> \u26A0\uFE0F **Frontend** \u00B7 _An\u00E1lisis no ejecutado \u2014 verificar configuraci\u00F3n de acceso_';
            } else if (qg === 'OK') {
              content = `> \u2705 **Frontend** \u00B7 Quality Gate Aprobado \u00B7 \u{1F517} [Ver an\u00E1lisis en detalle](${url})`;
            } else if (qg === 'ERROR') {
              content = `> \u274C **Frontend** \u00B7 Quality Gate No Aprobado \u00B7 \u{1F517} [Ver an\u00E1lisis en detalle](${url})`;
            } else {
              content = url
                ? `> \u26A0\uFE0F **Frontend** \u00B7 Quality Gate: ${qg || 'Pendiente'} \u00B7 \u{1F517} [Ver resultados](${url})`
                : `> \u26A0\uFE0F **Frontend** \u00B7 Quality Gate: ${qg || 'No disponible'}`;
            }

            await updateDashboard(github, context, { 'sonar-frontend': content });

  backend-unit-tests:
    name: "Pruebas Unitarias \u2014 Backend"
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs: [init-dashboard]
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    outputs:
      backend_report_url: ${{ steps.publish-backend-report.outputs.backend_report_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ./backend/package-lock.json

      - name: Restore and build backend
        working-directory: ./backend
        run: |
          dotnet restore TuCreditoOnline.sln
          dotnet build TuCreditoOnline.sln --no-restore --configuration Release

      - name: Run backend unit tests
        working-directory: ./backend
        run: |
          dotnet test tests/TuCreditoOnline.Tests/TuCreditoOnline.Tests.csproj \
            --no-build --configuration Release \
            --filter "FullyQualifiedName~.UnitTests." \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./TestResults \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
        continue-on-error: true

      - name: Generate backend test reports
        if: always()
        working-directory: ./backend
        run: |
          npm ci
          npm run test:report || true
          dotnet tool install -g dotnet-reportgenerator-globaltool || true
          COVERAGE_FILE=$(find ./TestResults -name "coverage.cobertura.xml" -type f | head -n 1)
          if [ -n "$COVERAGE_FILE" ]; then
            reportgenerator -reports:"$COVERAGE_FILE" -targetdir:./TestResults/coverage-report -reporttypes:Html || true
          fi

      - name: Upload backend reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-unit-test-report
          path: |
            backend/TestResults/test-report.html
            backend/TestResults/test-report.md
            backend/TestResults/coverage-report/**
          retention-days: 90
          if-no-files-found: warn

      - name: Publish backend unit report to Surge
        if: always()
        id: publish-backend-report
        working-directory: ./backend
        run: |
          if [ -f "TestResults/test-report.html" ]; then
            npx surge --project TestResults --domain ${{ env.BACKEND_REPORT_DOMAIN }}
            echo "backend_report_url=${{ env.BACKEND_REPORT_URL }}" >> $GITHUB_OUTPUT
          fi
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Actualizar panel de resultados
        if: always()
        uses: actions/github-script@v8
        env:
          REPORT_URL: ${{ steps.publish-backend-report.outputs.backend_report_url }}
        with:
          script: |
            async function updateDashboard(github, context, sections) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              const c = comments.find(c => c.body?.includes('<!-- ci-dashboard -->'));
              if (!c) return;
              let body = c.body;
              for (const [name, content] of Object.entries(sections)) {
                const s = `<!-- section:${name} -->`, e = `<!-- /section:${name} -->`;
                const si = body.indexOf(s), ei = body.indexOf(e);
                if (si !== -1 && ei !== -1)
                  body = body.substring(0, si + s.length) + '\n' + content + '\n' + body.substring(ei);
              }
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: c.id, body,
              });
            }

            const url = process.env.REPORT_URL;
            const content = url
              ? `> \u2705 **Backend** \u00B7 Pruebas completadas \u00B7 \u{1F4C4} [Ver reporte detallado](${url})`
              : '> \u2705 **Backend** \u00B7 Pruebas completadas \u00B7 \u{1F4E6} _Reporte disponible en artefactos_';

            await updateDashboard(github, context, { 'unit-backend': content });

