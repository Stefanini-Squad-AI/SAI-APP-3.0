name: CI Pipeline

on:
  push:
    branches: ['main']
    paths-ignore: ['**/*.md']
  pull_request:
    branches: ['main']
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore: ['**/*.md']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20'

jobs:
  sonarqube-backend:
    name: 🔍 SonarQube Backend (.NET)
    if: secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install scanner
        run: dotnet tool update dotnet-sonarscanner --tool-path "${{ runner.temp }}/scanner"

      - name: Run scan
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          cd backend
          "${{ runner.temp }}/scanner/dotnet-sonarscanner" begin \
            /k:"sai-app-3-backend" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.host.url="$SONAR_HOST_URL"
          dotnet build TuCreditoOnline.sln --configuration Release
          "${{ runner.temp }}/scanner/dotnet-sonarscanner" end /d:sonar.token="$SONAR_TOKEN"

  sonarqube-frontend:
    name: 🔍 SonarQube Frontend (React/Vite)
    if: secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.projectKey=sai-app-3-frontend
            -Dsonar.projectName=sai-app-3-frontend
            -Dsonar.sources=src
            -Dsonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/__tests__/**
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  frontend-unit-tests:
    name: 🧪 Frontend Unit Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run tests with coverage
        run: npm test -- --ci --coverage --passWithNoTests --json --outputFile test-results/jest/results.json
        working-directory: frontend

      - name: Build markdown/html report
        shell: bash
        run: |
          node -e "
          const fs=require('fs');
          const p='frontend/test-results/jest/results.json';
          const outMd='frontend/test-results/jest/test-report.md';
          const outHtml='frontend/test-results/jest/test-report.html';
          const r=JSON.parse(fs.readFileSync(p,'utf8'));
          const passRate=r.numTotalTests?((r.numPassedTests/r.numTotalTests)*100).toFixed(2):'0.00';
          let md='## 🧪 Frontend Unit Tests (Jest) summary\n\n';
          md+='| Metric | Value |\n|---|---|\n';
          md+='| Total Tests | '+r.numTotalTests+' |\n';
          md+='| Passed | '+r.numPassedTests+' |\n';
          md+='| Failed | '+r.numFailedTests+' |\n';
          md+='| Success Rate | '+passRate+'% |\n';
          fs.writeFileSync(outMd,md);
          fs.writeFileSync(outHtml,'<html><body><pre>'+md.replace(/</g,'&lt;')+'</pre></body></html>');
          "

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-unit-test-results
          path: |
            frontend/test-results/jest/junit.xml
            frontend/test-results/jest/results.json
            frontend/test-results/jest/test-report.md
            frontend/test-results/jest/test-report.html
            frontend/coverage/**
          retention-days: 90

      - name: Add job summary
        if: always()
        run: cat frontend/test-results/jest/test-report.md >> "$GITHUB_STEP_SUMMARY"
        shell: bash

  backend-unit-tests:
    name: 🧪 Backend Unit Tests (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore TuCreditoOnline.sln
        working-directory: backend

      - name: Run tests
        run: >
          dotnet test TuCreditoOnline.sln
          --configuration Release
          --no-restore
          --logger "trx;LogFileName=results.trx"
          --results-directory ./TestResults
          --collect:"XPlat Code Coverage"
        working-directory: backend

      - name: Build markdown/html report
        shell: bash
        run: |
          python - <<'PY'
          import glob
          import xml.etree.ElementTree as ET

          trx_files = glob.glob("backend/TestResults/**/*.trx", recursive=True)
          total = passed = failed = skipped = 0
          if trx_files:
              tree = ET.parse(trx_files[0])
              root = tree.getroot()
              ns = {"t": "http://microsoft.com/schemas/VisualStudio/TeamTest/2010"}
              counters = root.find(".//t:Counters", ns)
              if counters is not None:
                  total = int(counters.attrib.get("total", "0"))
                  passed = int(counters.attrib.get("passed", "0"))
                  failed = int(counters.attrib.get("failed", "0"))
                  skipped = int(counters.attrib.get("notExecuted", "0"))

          pass_rate = (passed / total * 100.0) if total else 0.0
          md = "\n".join([
              "## 🧪 Backend Unit Tests (.NET) summary",
              "",
              "| Metric | Value |",
              "|---|---|",
              f"| Total Tests | {total} |",
              f"| Passed | {passed} |",
              f"| Failed | {failed} |",
              f"| Skipped | {skipped} |",
              f"| Pass Rate | {pass_rate:.2f}% |",
              ""
          ])
          open("backend/TestResults/test-report.md", "w", encoding="utf-8").write(md)
          open("backend/TestResults/test-report.html", "w", encoding="utf-8").write(
              "<html><body><pre>" + md.replace("<", "&lt;") + "</pre></body></html>"
          )
          PY

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-test-results
          path: |
            backend/TestResults/**/*.trx
            backend/TestResults/**/coverage.cobertura.xml
            backend/TestResults/test-report.md
            backend/TestResults/test-report.html
          retention-days: 90

      - name: Add job summary
        if: always()
        run: cat backend/TestResults/test-report.md >> "$GITHUB_STEP_SUMMARY"
        shell: bash

  build-and-quality-tests:
    name: 🏗️ Build & Quality Tests
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, frontend-unit-tests]
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend for Pages
        run: npm run build
        working-directory: frontend
        env:
          VITE_BASE_PATH: /SAI-APP-3.0/
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Copy index.html to 404.html
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Write build documentation
        shell: bash
        run: |
          mkdir -p artifacts/build-docs
          cat <<'EOF' > artifacts/build-docs/build-summary.md
          ## 🏗️ Build & Quality Tests summary

          - Frontend build for GitHub Pages completed
          - SPA fallback generated (`404.html`)
          - Artifacts include build output and this documentation
          EOF
          cp artifacts/build-docs/build-summary.md artifacts/build-docs/build-summary.html

      - name: Upload build-quality artifact
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            frontend/dist/**
            artifacts/build-docs/**
          retention-days: 90

      - name: Add job summary
        run: cat artifacts/build-docs/build-summary.md >> "$GITHUB_STEP_SUMMARY"
        shell: bash

  functional-tests-web:
    name: 🌐 Functional Tests - Web
    if: >
      (secrets.PERPLEXITY_API_KEY != '' || secrets.GEMINI_API_KEY != '' || secrets.OPENAI_API_KEY != '')
    runs-on: ubuntu-latest
    needs: [build-and-quality-tests]
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            automation/package-lock.json

      - name: Build and preview frontend
        shell: bash
        run: |
          cd frontend
          npm ci
          npm run build
          npm run preview -- --host 127.0.0.1 --port 4173 &
          echo $! > ../preview.pid
          sleep 10

      - name: Run AURA functional tests
        working-directory: automation
        run: |
          npm ci
          npx playwright install chromium --with-deps
          npx cucumber-js --profile en --tags @ci
        env:
          BASE_URL: http://127.0.0.1:4173
          MODEL_PROVIDER:            ${{ secrets.MODEL_PROVIDER || 'perplexity' }}
          PERPLEXITY_API_KEY:        ${{ secrets.PERPLEXITY_API_KEY }}
          PERPLEXITY_MODEL:          ${{ secrets.PERPLEXITY_MODEL || 'sonar' }}
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY:            ${{ secrets.OPENAI_API_KEY }}
          AURA_BROWSER:              chromium
          AURA_HEADLESS:             true
          AURA_TIMEOUT:              30000
          AURA_COGNITIVE_ENABLED:    false

      - name: Stop preview
        if: always()
        shell: bash
        run: |
          if [ -f preview.pid ]; then
            kill "$(cat preview.pid)" || true
          fi

      - name: Upload functional artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functional-web-test-report
          path: automation/reports/**
          retention-days: 90
          if-no-files-found: warn

      - name: Functional summary
        if: always()
        shell: bash
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## 🌐 Functional Tests - Web summary

          - Tests run against local preview (`http://127.0.0.1:4173`) from current PR/commit code
          - Download `functional-web-test-report` artifact for detailed HTML reports
          EOF

  security-scan:
    name: 🔒 Security Tests (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: [build-and-quality-tests]
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Start local preview
        shell: bash
        run: |
          cd frontend
          npm ci
          npm run build
          npm run preview -- --host 127.0.0.1 --port 4173 &
          echo $! > ../preview.pid
          sleep 10

      - name: Run ZAP baseline scan
        shell: bash
        run: |
          mkdir -p test-results/security
          docker run --rm --network host \
            -v "$(pwd)/test-results/security:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://127.0.0.1:4173 \
            -r report_html.html \
            -J report_json.json \
            -w report_md.md \
            -I || true

      - name: Stop preview
        if: always()
        shell: bash
        run: |
          if [ -f preview.pid ]; then
            kill "$(cat preview.pid)" || true
          fi

      - name: Upload security artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results
          path: |
            test-results/security/report_html.html
            test-results/security/report_json.json
            test-results/security/report_md.md
          retention-days: 90
          if-no-files-found: warn

  deploy-github-pages:
    name: 🚀 Deploy to GitHub Pages
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, frontend-unit-tests, build-and-quality-tests]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: integration-test-results
          path: artifact-download

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: artifact-download/frontend/dist

      - name: Deploy Pages
        id: deploy
        uses: actions/deploy-pages@v4.0.5

  pipeline-summary:
    name: 📊 Pipeline Summary
    if: always()
    runs-on: ubuntu-latest
    needs:
      - sonarqube-backend
      - sonarqube-frontend
      - backend-unit-tests
      - frontend-unit-tests
      - build-and-quality-tests
      - functional-tests-web
      - security-scan
      - deploy-github-pages
    steps:
      - name: Generate summary
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const jobs = {
              '🔍 SonarQube Backend': '${{ needs.sonarqube-backend.result }}',
              '🔍 SonarQube Frontend': '${{ needs.sonarqube-frontend.result }}',
              '🧪 Backend Unit Tests': '${{ needs.backend-unit-tests.result }}',
              '🧪 Frontend Unit Tests': '${{ needs.frontend-unit-tests.result }}',
              '🏗️ Build & Quality': '${{ needs.build-and-quality-tests.result }}',
              '🌐 Functional Tests': '${{ needs.functional-tests-web.result }}',
              '🔒 Security Tests': '${{ needs.security-scan.result }}',
              '🚀 Deploy to Pages': '${{ needs.deploy-github-pages.result }}'
            };

            const icon = r =>
              r === 'success' ? '✅' :
              r === 'failure' ? '❌' :
              r === 'skipped' ? '⏭️' : '⚠️';

            await core.summary
              .addHeading('CI Pipeline Results')
              .addTable([
                [{data: 'Phase', header: true}, {data: 'Result', header: true}],
                ...Object.entries(jobs).map(([name, result]) => [name, `${icon(result)} ${result}`])
              ])
              .addHeading('Downloadable Artifacts')
              .addRaw('- `backend-unit-test-results`\n')
              .addRaw('- `frontend-unit-test-results`\n')
              .addRaw('- `integration-test-results`\n')
              .addRaw('- `functional-web-test-report`\n')
              .addRaw('- `security-test-results`\n')
              .write();
