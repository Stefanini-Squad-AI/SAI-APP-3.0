name: PR Cleanup

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  cleanup:
    # Only run when /cleanup is commented on an open pull request
    if: |
      github.event.issue.pull_request != null &&
      github.event.issue.state == 'open' &&
      contains(github.event.comment.body, '/cleanup')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Close PR and delete branch
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const branch = pr.data.head.ref;

            // Close the pull request
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: 'closed',
            });

            // Delete the branch
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`,
              });
            } catch (e) {
              console.warn(`Could not delete branch ${branch}: ${e.message}`);
            }

            // Confirm in a comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🧹 Cleaned up by @${context.actor} — PR closed and branch \`${branch}\` deleted.`,
            });
