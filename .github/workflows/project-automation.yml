name: Project Board Automation

on:
  projects_v2_item:
    types: [edited]

permissions:
  contents: write
  pull-requests: write

jobs:
  handle-tasks-done:
    runs-on: ubuntu-latest
    steps:
      - name: Close PR, delete branch, move back to TASKS TO DO
        uses: actions/github-script@v7.0.1
        with:
          # Requires a PAT with 'project' scope added as the PROJECT_TOKEN secret.
          # The default GITHUB_TOKEN cannot read or write project fields.
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const itemNodeId = context.payload.projects_v2_item.node_id;
            const projectNodeId = context.payload.projects_v2_item.project_node_id;

            // Fetch the item's current status and its linked PR details
            const itemData = await github.graphql(`
              query GetItem($nodeId: ID!) {
                node(id: $nodeId) {
                  ... on ProjectV2Item {
                    content {
                      ... on PullRequest {
                        number
                        headRefName
                        state
                        repository { name owner { login } }
                      }
                    }
                    fieldValues(first: 20) {
                      nodes {
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          name
                          field { ... on ProjectV2SingleSelectField { name } }
                        }
                      }
                    }
                  }
                }
              }
            `, { nodeId: itemNodeId });

            const item = itemData.node;

            // Only act when the Status field is exactly "TASKS DONE"
            const statusValue = item.fieldValues.nodes.find(fv =>
              fv.field?.name?.toLowerCase() === 'status'
            );
            if (!statusValue || statusValue.name !== 'TASKS DONE') {
              console.log(`Status is "${statusValue?.name}" — skipping.`);
              return;
            }

            const pr = item.content;
            if (!pr?.number) {
              console.log('Item is not a pull request — skipping.');
              return;
            }

            const { login: owner } = pr.repository.owner;
            const { name: repo }  = pr.repository;
            const { number: prNumber, headRefName: branch } = pr;

            // Close the PR (if still open)
            if (pr.state === 'OPEN') {
              await github.rest.pulls.update({
                owner, repo, pull_number: prNumber, state: 'closed',
              });
              console.log(`Closed PR #${prNumber}`);
            }

            // Delete the branch
            try {
              await github.rest.git.deleteRef({
                owner, repo, ref: `heads/${branch}`,
              });
              console.log(`Deleted branch ${branch}`);
            } catch (e) {
              console.warn(`Could not delete branch ${branch}: ${e.message}`);
            }

            // Fetch the project's Status field and its options
            const projectData = await github.graphql(`
              query GetProjectFields($nodeId: ID!) {
                node(id: $nodeId) {
                  ... on ProjectV2 {
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `, { nodeId: projectNodeId });

            const statusField = projectData.node.fields.nodes.find(
              f => f.name?.toLowerCase() === 'status'
            );
            if (!statusField) {
              console.warn('Could not find the Status field in the project.');
              return;
            }

            const todoOption = statusField.options.find(
              o => o.name?.toUpperCase() === 'TASKS TO DO'
            );
            if (!todoOption) {
              console.warn('Could not find the TASKS TO DO option.');
              return;
            }

            // Move the card back to TASKS TO DO
            await github.graphql(`
              mutation MoveToTodo(
                $projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!
              ) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId:    $itemId
                  fieldId:   $fieldId
                  value:     { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item { id }
                }
              }
            `, {
              projectId: projectNodeId,
              itemId:    itemNodeId,
              fieldId:   statusField.id,
              optionId:  todoOption.id,
            });

            console.log(`PR #${prNumber} — branch deleted, PR closed, card moved to TASKS TO DO.`);
