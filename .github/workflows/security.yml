name: Security Scan (OWASP ZAP)

on:
  # Run after every successful GitHub Pages deployment
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL to scan (default: GitHub Pages)"
        required: false
        default: "https://stefanini-squad-ai.github.io/SAI-APP-3.0"

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  zap-baseline:
    name: ZAP Baseline Scan
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ github.event.inputs.target_url || 'https://stefanini-squad-ai.github.io/SAI-APP-3.0' }}
          rules_file_name: .zap/rules.tsv
          cmd_options: >
            -a
            -j
            -T 5
          fail_action: false
          allow_issue_writing: false

      - name: Upload ZAP scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-${{ github.run_number }}
          path: |
            report_html.html
            report_json.json
            report_md.md
          retention-days: 90
