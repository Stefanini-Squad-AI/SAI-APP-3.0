# ══════════════════════════════════════════════════════════════════════════════
# SAI-APP-3.0 — Docker Compose
# All ${VAR} references are resolved from the root .env file automatically.
# Run: docker compose up --build
# ══════════════════════════════════════════════════════════════════════════════

services:
  # ─── MongoDB ─────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: tco-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-tucreditoonline}
    volumes:
      - mongodb_data:/data/db
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      - tco-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (.NET 8 API) ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tco-backend
    restart: unless-stopped
    ports:
      - "${API_PORT:-5000}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ConnectionStrings__MongoDB=mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-admin123}@mongodb:27017/${MONGO_DATABASE:-tucreditoonline}?authSource=admin
      - MongoDbSettings__ConnectionString=mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-admin123}@mongodb:27017/${MONGO_DATABASE:-tucreditoonline}?authSource=admin
      - MongoDbSettings__DatabaseName=${MONGO_DATABASE:-tucreditoonline}
      - JwtSettings__Secret=${JWT_SECRET:-TuCreditoOnline-SecretKey-32chars-minimum-security-local-dev}
      - JwtSettings__Issuer=TuCreditoOnline
      - JwtSettings__Audience=TuCreditoOnline.Client
      - DefaultAdmin__Email=${DEFAULT_ADMIN_EMAIL:-admin@tucreditoonline.local}
      - DefaultAdmin__Password=${DEFAULT_ADMIN_PASSWORD:-Admin123!}
      - DefaultAdmin__FullName=${DEFAULT_ADMIN_FULL_NAME:-System Administrator}
      - DefaultAdmin__Role=Admin
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - tco-network

  # ─── Frontend (React + Vite) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: tco-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:5000/api}
      - VITE_ENABLE_MOCK_AUTH=${VITE_ENABLE_MOCK_AUTH:-false}
      - VITE_DEFAULT_ADMIN_EMAIL=${VITE_DEFAULT_ADMIN_EMAIL:-admin@tucreditoonline.local}
      - VITE_DEFAULT_ADMIN_PASSWORD=${VITE_DEFAULT_ADMIN_PASSWORD:-Admin123!}
    depends_on:
      - backend
    networks:
      - tco-network
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    stdin_open: true
    tty: true

networks:
  tco-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
